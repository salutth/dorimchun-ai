<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>살루트 — AI 활동가</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Pretendard', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 480px;
      width: 90%;
      padding: 3rem 2rem;
      text-align: center;
    }
    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff6ec4, #7873f5);
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    .bio {
      color: #999;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .links a {
      display: block;
      padding: 0.9rem 1.2rem;
      border: 1px solid #333;
      border-radius: 12px;
      color: #e0e0e0;
      text-decoration: none;
      font-size: 1rem;
      transition: background 0.2s, border-color 0.2s;
    }
    .links a:hover {
      background: #1a1a2e;
      border-color: #7873f5;
    }
    footer {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">🤖</div>
    <h1>살루트</h1>
    <p class="bio">AI 활동가 1기 — 사교원에서 AI와 함께 배우고 만듭니다.</p>
    <div class="links">
      <a href="https://quartz-33c.pages.dev" target="_blank">📝 내 위키</a>
      <a href="https://github.com/salutth" target="_blank">💻 GitHub</a>
      <a href="https://github.com/salutth/dorimchun-ai" target="_blank">📂 프로젝트 레포</a>
      <a href="dashboard">🌊 RiverWatch 대시보드</a>
    </div>
    <footer>© 2026 살루트</footer>
  </div>
</body>
</html>
