<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RiverWatch — 서울하천 AI 모니터링</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Pretendard', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0a0a1a 100%);
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: #7873f5; }
    header a { color: #666; text-decoration: none; font-size: 0.85rem; }
    header a:hover { color: #7873f5; }

    .container { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; }

    .report-header {
      text-align: center;
      padding: 2rem 0 1.5rem;
    }
    .report-header h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.5rem; }
    .report-header .meta { font-size: 0.8rem; color: #888; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 0.8rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
    }
    .stat-card .value {
      font-size: 1.8rem;
      font-weight: 800;
      color: #7873f5;
      line-height: 1.2;
    }
    .stat-card .label {
      font-size: 0.72rem;
      color: #888;
      margin-top: 0.3rem;
    }
    .stat-card.alert .value { color: #f5734d; }
    .stat-card.good .value { color: #2ecc71; }

    .section {
      background: #12121a;
      border: 1px solid #1e1e2e;
      border-radius: 14px;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
    }
    .section h3 {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section h3 .icon { font-size: 1.2rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    th {
      background: #1a1a28;
      padding: 0.5rem 0.6rem;
      text-align: left;
      font-weight: 600;
      color: #aaa;
      border-bottom: 1px solid #2a2a3a;
    }
    td {
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid #1a1a28;
    }
    tr:hover td { background: #1a1a2a; }

    .grade-badge {
      display: inline-block;
      padding: 0.15rem 0.5rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .grade-A, .grade-B { background: #2ecc7133; color: #2ecc71; }
    .grade-C { background: #f39c1233; color: #f39c12; }
    .grade-D, .grade-E { background: #e74c3c33; color: #e74c3c; }

    .chart-container {
      position: relative;
      height: 280px;
      margin: 1rem 0;
    }

    .rec-list { list-style: none; }
    .rec-item {
      display: flex;
      align-items: flex-start;
      gap: 0.7rem;
      padding: 0.8rem;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      font-size: 0.85rem;
      line-height: 1.5;
    }
    .rec-item.urgent { background: #e74c3c15; border-left: 3px solid #e74c3c; }
    .rec-item.warning { background: #f39c1215; border-left: 3px solid #f39c12; }
    .rec-item.ok { background: #2ecc7115; border-left: 3px solid #2ecc71; }
    .rec-priority {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      white-space: nowrap;
    }
    .rec-priority.urgent { background: #e74c3c33; color: #e74c3c; }
    .rec-priority.warning { background: #f39c1233; color: #f39c12; }
    .rec-priority.ok { background: #2ecc7133; color: #2ecc71; }

    .top-species {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.8rem;
    }
    .species-chip {
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.75rem;
    }
    .species-chip .count { color: #7873f5; font-weight: 700; margin-left: 0.3rem; }

    .loading {
      text-align: center;
      padding: 4rem;
      color: #666;
      font-size: 0.9rem;
    }
    .loading .spinner {
      width: 36px; height: 36px;
      border: 3px solid #222;
      border-top-color: #7873f5;
      border-radius: 50%;
      margin: 0 auto 1rem;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      text-align: center;
      padding: 2rem 0;
      color: #555;
      font-size: 0.75rem;
    }

    .overflow-x { overflow-x: auto; }

    .btn-print {
      background: #7873f5;
      color: #fff;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .btn-print:hover { background: #6560e0; }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 0.3rem;
    }
    .status-dot.safe { background: #2ecc71; }
    .status-dot.caution { background: #f39c12; }
    .status-dot.warning { background: #e67e22; }
    .status-dot.danger { background: #e74c3c; }

    .risk-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: #1a1a28;
      margin-top: 0.3rem;
    }
    .risk-bar .fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 0.6rem;
    }
    .forecast-card {
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      padding: 0.8rem;
      text-align: center;
      font-size: 0.78rem;
    }
    .forecast-card .fc-time { color: #aaa; font-size: 0.72rem; margin-bottom: 0.3rem; }
    .forecast-card .fc-icon { font-size: 1.4rem; margin: 0.2rem 0; }
    .forecast-card .fc-temp { font-size: 1rem; font-weight: 700; color: #e0e0e0; }
    .forecast-card .fc-rain { color: #5dade2; font-size: 0.72rem; margin-top: 0.2rem; }

    .resilience-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.4rem;
      margin-top: 0.5rem;
    }
    .r4-item {
      background: #1a1a28;
      border-radius: 8px;
      padding: 0.5rem;
      text-align: center;
      font-size: 0.72rem;
    }
    .r4-item .r4-val { font-size: 1rem; font-weight: 700; color: #7873f5; }
    .r4-item .r4-label { color: #888; margin-top: 0.2rem; }

    @media (max-width: 600px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .chart-container { height: 220px; }
      .resilience-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media print {
      * { overflow: visible !important; }
      body { background: #fff; color: #222; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      header { background: #fff; border-bottom: 2px solid #333; position: relative; }
      header h1 span { color: #4a45c0; }
      header a, .btn-print { display: none !important; }
      .container { max-width: 100%; padding: 0; }
      .section { background: #fff; border: 1px solid #ddd; page-break-inside: auto; break-inside: auto; margin-bottom: 1rem; }
      .section h3 { page-break-after: avoid; }
      table { page-break-inside: auto; }
      tr { page-break-inside: avoid; }
      .stat-card { background: #f8f8f8; border: 1px solid #ddd; }
      .stat-card .value { color: #333; }
      .stat-card.alert .value { color: #e74c3c; }
      .stat-card.good .value { color: #2ecc71; }
      th { background: #f0f0f0 !important; color: #333; }
      td { color: #333; border-bottom: 1px solid #eee; }
      tr:hover td { background: transparent; }
      .chart-container { position: relative; height: 250px !important; page-break-inside: avoid; break-inside: avoid; margin: 0.5rem 0; }
      .chart-container canvas { max-height: 250px; }
      .species-chip { border: 1px solid #ccc; }
      .footer { color: #999; page-break-before: auto; }
      .rec-list { page-break-inside: avoid; }
      .summary-grid { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header>
    <h1><span>RiverWatch</span> 분석 보고서</h1>
    <div style="display:flex;align-items:center;gap:0.8rem;">
      <button class="btn-print" onclick="window.print()">🖨️ 인쇄/PDF</button>
      <a href="/dashboard">대시보드</a>
    </div>
  </header>

  <div class="container">
    <div id="loading" class="loading">
      <div class="spinner"></div>
      보고서 데이터를 불러오는 중...
    </div>

    <div id="reportContent" style="display:none">
      <div class="report-header">
        <h2 id="reportTitle"></h2>
        <div class="meta" id="reportMeta"></div>
      </div>

      <div class="summary-grid" id="summaryGrid"></div>

      <div class="section" id="recSection">
        <h3><span class="icon">📋</span> 정책 제언</h3>
        <ul class="rec-list" id="recList"></ul>
      </div>

      <div class="section">
        <h3><span class="icon">🌿</span> 생태건강지수 (EHI)</h3>
        <div class="chart-container"><canvas id="ehiChart"></canvas></div>
        <div class="overflow-x"><table id="ehiTable"></table></div>
      </div>

      <div class="section">
        <h3><span class="icon">💧</span> 수질 TMS</h3>
        <div class="chart-container"><canvas id="wqChart"></canvas></div>
        <div class="overflow-x"><table id="wqTable"></table></div>
      </div>

      <div class="section">
        <h3><span class="icon">🐾</span> 생물다양성</h3>
        <div class="chart-container"><canvas id="speciesChart"></canvas></div>
        <div id="topSpecies"></div>
      </div>

      <div class="section" id="alertSection">
        <h3><span class="icon">⚠️</span> 외래종 경보</h3>
        <div class="overflow-x"><table id="alertTable"></table></div>
      </div>

      <div class="section" id="waterLevelSection">
        <h3><span class="icon">🌊</span> 수위 현황</h3>
        <div class="chart-container"><canvas id="waterLevelChart"></canvas></div>
        <div class="overflow-x"><table id="waterLevelTable"></table></div>
      </div>

      <div class="section" id="weatherSection">
        <h3><span class="icon">🌤️</span> 기상 예보</h3>
        <div id="weatherForecast" class="forecast-grid"></div>
      </div>

      <div class="section" id="aiPredSection">
        <h3><span class="icon">🤖</span> AI 수위 예측 (LSTM)</h3>
        <div class="chart-container"><canvas id="aiPredChart"></canvas></div>
        <div class="overflow-x"><table id="aiPredTable"></table></div>
      </div>

      <div class="section" id="aiVerifySection">
        <h3><span class="icon">🔍</span> AI 예측 검증</h3>
        <div class="chart-container"><canvas id="aiVerifyChart"></canvas></div>
        <div class="overflow-x" id="aiVerifyStats"></div>
      </div>

      <div class="section" id="ksafeSection">
        <h3><span class="icon">🛡️</span> K-SAFE 홍수위험지수</h3>
        <div class="chart-container"><canvas id="ksafeChart"></canvas></div>
        <div class="overflow-x"><table id="ksafeTable"></table></div>
        <div id="ksafeResilience"></div>
      </div>

      <div class="footer" id="reportFooter"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://luczuisihsskyhhqgviy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1Y3p1aXNpaHNza3loaHFndml5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5ODEyOTMsImV4cCI6MjA5ODU1NzI5M30.0OUvdrYVWMnwGpE8vq6EeW-cMI9cZ2bw8ShMwrJARuU';

    async function sbGet(table, params = '') {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
      });
      return res.ok ? res.json() : [];
    }

    function gradeClass(g) {
      if (g === 'A' || g === 'B') return 'grade-A';
      if (g === 'C') return 'grade-C';
      return 'grade-D';
    }

    async function loadReport() {
      const [ehi, species, readings, wq, alerts, predictions, riskIndex, weather] = await Promise.all([
        sbGet('ehi_scores', 'select=*&order=calculated_at.desc&limit=100'),
        sbGet('species_observations', 'select=taxon_name,river,is_invasive,observed_at,source&order=observed_at.desc&limit=1000'),
        sbGet('river_readings', 'select=station,river,gu,water_level,embankment_height,level_ratio,status,measured_at&order=measured_at.desc&limit=500'),
        sbGet('water_quality', 'select=*&order=collected_at.desc&limit=500'),
        sbGet('invasive_alerts', 'select=*&order=created_at.desc&limit=50'),
        sbGet('flood_predictions', 'select=*&order=predicted_at.desc&limit=200'),
        sbGet('flood_risk_index', 'select=*&order=calculated_at.desc&limit=100'),
        sbGet('weather_forecasts', 'select=*&order=forecast_date.desc,collected_at.desc&limit=200'),
      ]);

      const now = new Date();
      const monthStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;

      document.getElementById('reportTitle').textContent = `서울 하천 생태 종합 분석 보고서 — ${monthStr}`;
      document.getElementById('reportMeta').textContent = `${now.toLocaleString('ko-KR')} | RiverWatch Auto Report v2 자동 생성`;

      const latestEhi = {};
      ehi.forEach(e => { if (e.river && !latestEhi[e.river]) latestEhi[e.river] = e; });
      const ehiScores = Object.values(latestEhi).map(e => e.ehi_score || 0);
      const avgEhi = ehiScores.length ? (ehiScores.reduce((a,b) => a+b, 0) / ehiScores.length).toFixed(1) : 0;

      const uniqueSpecies = new Set(species.filter(s => s.taxon_name).map(s => s.taxon_name));
      const invasiveCount = species.filter(s => s.is_invasive).length;
      const dangerCount = new Set(readings.filter(r => r.status === 'danger').map(r => r.station)).size;

      const wqStations = {};
      wq.forEach(r => { if (r.station_name) wqStations[r.station_name] = (wqStations[r.station_name] || []).concat(r); });
      const allDO = wq.filter(r => r.dissolved_oxygen).map(r => parseFloat(r.dissolved_oxygen));
      const avgDO = allDO.length ? (allDO.reduce((a,b) => a+b,0) / allDO.length).toFixed(1) : 'N/A';

      // K-SAFE avg composite score
      const latestRisk = {};
      riskIndex.forEach(r => { if (r.river && !latestRisk[r.river]) latestRisk[r.river] = r; });
      const riskScores = Object.values(latestRisk).map(r => r.composite_score || 0);
      const avgKsafe = riskScores.length ? (riskScores.reduce((a,b) => a+b, 0) / riskScores.length).toFixed(1) : 'N/A';

      // AI prediction MAPE
      const mapeResult = computeMAPE(predictions, readings);

      const grid = document.getElementById('summaryGrid');
      const stats = [
        { value: Object.keys(latestEhi).length, label: '모니터링 하천', cls: '' },
        { value: avgEhi, label: '평균 EHI', cls: avgEhi >= 60 ? 'good' : avgEhi >= 40 ? '' : 'alert' },
        { value: uniqueSpecies.size, label: '관찰 종 수', cls: '' },
        { value: species.length, label: '총 관찰 건수', cls: '' },
        { value: invasiveCount, label: '외래종 감지', cls: invasiveCount > 0 ? 'alert' : 'good' },
        { value: dangerCount, label: '위험 관측소', cls: dangerCount > 0 ? 'alert' : 'good' },
        { value: Object.keys(wqStations).length, label: '수질 관측소', cls: '' },
        { value: avgDO, label: '평균 DO (mg/L)', cls: '' },
        { value: avgKsafe, label: 'K-SAFE 평균', cls: parseFloat(avgKsafe) >= 70 ? 'alert' : parseFloat(avgKsafe) >= 40 ? '' : 'good' },
        { value: mapeResult.mape !== null ? mapeResult.mape.toFixed(1) + '%' : 'N/A', label: 'AI 예측 MAPE', cls: mapeResult.mape !== null && mapeResult.mape < 15 ? 'good' : 'alert' },
      ];
      grid.innerHTML = stats.map(s =>
        `<div class="stat-card ${s.cls}"><div class="value">${s.value}</div><div class="label">${s.label}</div></div>`
      ).join('');

      renderEHI(latestEhi);
      renderWQ(wqStations);
      renderSpecies(species);
      renderAlerts(alerts);
      renderWaterLevel(readings);
      renderWeather(weather);
      renderAIPredictions(predictions);
      renderAIVerification(predictions, readings, mapeResult);
      renderKSAFE(latestRisk);
      renderRecommendations(avgEhi, invasiveCount, dangerCount, wqStations, allDO, avgKsafe, mapeResult);

      document.getElementById('loading').style.display = 'none';
      document.getElementById('reportContent').style.display = 'block';
      document.getElementById('reportFooter').textContent =
        `이 보고서는 RiverWatch Auto Report v2에 의해 자동 생성되었습니다. | 건강한도림천을만드는주민모임.사회혁신교육원`;
    }

    function renderEHI(latestEhi) {
      const rivers = Object.entries(latestEhi).sort((a,b) => (b[1].ehi_score||0) - (a[1].ehi_score||0));

      const ctx = document.getElementById('ehiChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: rivers.map(([r]) => r),
          datasets: [{
            label: 'EHI 점수',
            data: rivers.map(([,e]) => e.ehi_score || 0),
            backgroundColor: rivers.map(([,e]) => {
              const g = e.grade;
              if (g === 'A' || g === 'B') return '#2ecc7188';
              if (g === 'C') return '#f39c1288';
              return '#e74c3c88';
            }),
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, max: 100, grid: { color: '#1a1a28' }, ticks: { color: '#888' } },
            x: { grid: { display: false }, ticks: { color: '#ccc', maxRotation: 45 } },
          }
        }
      });

      const tbl = document.getElementById('ehiTable');
      tbl.innerHTML = `<thead><tr><th>하천</th><th>EHI</th><th>등급</th><th>생물다양성</th><th>수위안정</th><th>종수</th></tr></thead><tbody>`
        + rivers.map(([r, e]) => `<tr>
          <td>${r}</td>
          <td>${(e.ehi_score||0).toFixed(1)}</td>
          <td><span class="grade-badge ${gradeClass(e.grade)}">${e.grade||'?'}</span></td>
          <td>${(e.biodiversity_score||0).toFixed(0)}</td>
          <td>${(e.water_stability_score||0).toFixed(0)}</td>
          <td>${e.species_count||0}</td>
        </tr>`).join('') + '</tbody>';
    }

    function renderWQ(wqStations) {
      const stations = Object.entries(wqStations).map(([name, records]) => {
        const avg = (arr) => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(2) : 'N/A';
        const ph = records.filter(r=>r.ph).map(r=>parseFloat(r.ph));
        const doV = records.filter(r=>r.dissolved_oxygen).map(r=>parseFloat(r.dissolved_oxygen));
        const temp = records.filter(r=>r.water_temp).map(r=>parseFloat(r.water_temp));
        return { name, count: records.length, ph: avg(ph), do: avg(doV), temp: avg(temp), doRaw: doV };
      });

      const ctx = document.getElementById('wqChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: stations.map(s => s.name),
          datasets: [
            { label: 'pH', data: stations.map(s => parseFloat(s.ph) || 0), backgroundColor: '#7873f588', borderRadius: 4 },
            { label: 'DO', data: stations.map(s => parseFloat(s.do) || 0), backgroundColor: '#2ecc7188', borderRadius: 4 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#ccc' } } },
          scales: {
            y: { beginAtZero: true, grid: { color: '#1a1a28' }, ticks: { color: '#888' } },
            x: { grid: { display: false }, ticks: { color: '#ccc' } },
          }
        }
      });

      const tbl = document.getElementById('wqTable');
      tbl.innerHTML = `<thead><tr><th>관측소</th><th>측정수</th><th>pH</th><th>DO</th><th>수온</th></tr></thead><tbody>`
        + stations.map(s => `<tr><td>${s.name}</td><td>${s.count}</td><td>${s.ph}</td><td>${s.do}</td><td>${s.temp}</td></tr>`).join('')
        + '</tbody>';
    }

    function renderSpecies(species) {
      const byRiver = {};
      const speciesCount = {};
      species.forEach(s => {
        if (s.river) {
          if (!byRiver[s.river]) byRiver[s.river] = new Set();
          if (s.taxon_name) byRiver[s.river].add(s.taxon_name);
        }
        if (s.taxon_name) speciesCount[s.taxon_name] = (speciesCount[s.taxon_name] || 0) + 1;
      });

      const riverData = Object.entries(byRiver).map(([r, s]) => ({ river: r, count: s.size })).sort((a,b) => b.count - a.count).slice(0, 10);

      const ctx = document.getElementById('speciesChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: riverData.map(d => d.river),
          datasets: [{
            label: '관찰 종 수',
            data: riverData.map(d => d.count),
            backgroundColor: '#7873f566',
            borderColor: '#7873f5',
            borderWidth: 1,
            borderRadius: 6,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { beginAtZero: true, grid: { color: '#1a1a28' }, ticks: { color: '#888' } },
            y: { grid: { display: false }, ticks: { color: '#ccc' } },
          }
        }
      });

      const topSp = Object.entries(speciesCount).sort((a,b) => b[1] - a[1]).slice(0, 15);
      document.getElementById('topSpecies').innerHTML = '<h4 style="font-size:0.85rem;margin:1rem 0 0.5rem;color:#aaa;">다빈도 관찰 종</h4>'
        + '<div class="top-species">' + topSp.map(([name, cnt]) =>
        `<span class="species-chip">${name}<span class="count">${cnt}</span></span>`
      ).join('') + '</div>';
    }

    function renderAlerts(alerts) {
      const tbl = document.getElementById('alertTable');
      if (!alerts.length) {
        tbl.innerHTML = '<p style="color:#888;font-size:0.85rem;">현재 외래종 경보 없음</p>';
        return;
      }
      const levelKr = { critical: '긴급', warning: '주의', info: '관찰' };
      tbl.innerHTML = `<thead><tr><th>종명</th><th>하천</th><th>경보</th><th>감지일</th></tr></thead><tbody>`
        + alerts.slice(0,10).map(a => `<tr>
          <td>${a.species_name||''}</td>
          <td>${a.river||''}</td>
          <td>${levelKr[a.alert_level]||'?'}</td>
          <td>${(a.created_at||'').slice(0,10)}</td>
        </tr>`).join('') + '</tbody>';
    }

    function computeMAPE(predictions, readings) {
      // Match predictions to actual readings by station and target_time
      const readingMap = {};
      readings.forEach(r => {
        if (r.station && r.measured_at && r.level_ratio != null) {
          const key = r.station + '|' + r.measured_at.slice(0, 13);
          if (!readingMap[key]) readingMap[key] = r;
        }
      });

      const pairs = [];
      predictions.forEach(p => {
        if (!p.target_time || p.predicted_ratio == null) return;
        const key = p.station + '|' + p.target_time.slice(0, 13);
        const actual = readingMap[key];
        if (actual && actual.level_ratio != null && actual.level_ratio > 0) {
          pairs.push({
            station: p.station,
            river: p.river,
            predicted: p.predicted_ratio,
            actual: actual.level_ratio,
            ape: Math.abs(p.predicted_ratio - actual.level_ratio) / actual.level_ratio * 100
          });
        }
      });

      const mape = pairs.length ? pairs.reduce((s, p) => s + p.ape, 0) / pairs.length : null;
      return { mape, pairs, count: pairs.length };
    }

    function renderWaterLevel(readings) {
      // Latest reading per station
      const latest = {};
      readings.forEach(r => { if (r.station && !latest[r.station]) latest[r.station] = r; });
      const stations = Object.values(latest).sort((a,b) => (b.level_ratio||0) - (a.level_ratio||0));

      const statusKr = { safe: '안전', caution: '관심', warning: '주의', danger: '위험' };

      const ctx = document.getElementById('waterLevelChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: stations.map(s => s.river || s.station),
          datasets: [{
            label: '수위비 (%)',
            data: stations.map(s => ((s.level_ratio || 0) * 100).toFixed(1)),
            backgroundColor: stations.map(s => {
              const st = s.status;
              if (st === 'danger') return '#e74c3c88';
              if (st === 'warning') return '#e67e2288';
              if (st === 'caution') return '#f39c1288';
              return '#2ecc7188';
            }),
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: '#1a1a28' }, ticks: { color: '#888', callback: v => v + '%' } },
            x: { grid: { display: false }, ticks: { color: '#ccc', maxRotation: 45 } },
          }
        }
      });

      const tbl = document.getElementById('waterLevelTable');
      tbl.innerHTML = `<thead><tr><th>관측소</th><th>하천</th><th>구</th><th>수위(m)</th><th>제방고(m)</th><th>수위비</th><th>상태</th><th>측정시각</th></tr></thead><tbody>`
        + stations.map(s => `<tr>
          <td>${s.station||''}</td>
          <td>${s.river||''}</td>
          <td>${s.gu||''}</td>
          <td>${s.water_level != null ? parseFloat(s.water_level).toFixed(2) : '-'}</td>
          <td>${s.embankment_height != null ? parseFloat(s.embankment_height).toFixed(2) : '-'}</td>
          <td>${s.level_ratio != null ? (s.level_ratio * 100).toFixed(1) + '%' : '-'}</td>
          <td><span class="status-dot ${s.status||'safe'}"></span>${statusKr[s.status] || s.status || '-'}</td>
          <td>${(s.measured_at||'').slice(0,16).replace('T',' ')}</td>
        </tr>`).join('') + '</tbody>';
    }

    function renderWeather(weather) {
      if (!weather.length) {
        document.getElementById('weatherForecast').innerHTML = '<p style="color:#888;font-size:0.85rem;">기상 예보 데이터 없음</p>';
        return;
      }
      // Group by river, show latest forecast date
      const byRiver = {};
      weather.forEach(w => {
        const r = w.region || '';
        if (!byRiver[r]) byRiver[r] = [];
        byRiver[r].push(w);
      });

      const skyIcon = (code) => {
        if (code === 1 || code === '맑음') return '☀️';
        if (code === 3 || code === '구름많음') return '⛅';
        if (code === 4 || code === '흐림') return '☁️';
        return '🌤️';
      };
      const parseWeatherCond = (cond) => {
        const hm = (cond||'').match(/(\d{2}):(\d{2})/);
        const pm = (cond||'').match(/p(\d+)%/);
        const sky = (cond||'').replace(/\s*\d{2}:\d{2}\s*p\d+%/, '').trim();
        return { hour: hm ? parseInt(hm[1]) : 0, prob: pm ? parseInt(pm[1]) : 0, sky };
      };

      let html = '';
      Object.entries(byRiver).forEach(([river, forecasts]) => {
        const sorted = forecasts.sort((a,b) => parseWeatherCond(a.weather_condition).hour - parseWeatherCond(b.weather_condition).hour).slice(0, 8);
        html += `<div style="grid-column:1/-1;font-size:0.85rem;font-weight:600;color:#aaa;margin-top:0.5rem;">📍 ${river}</div>`;
        html += sorted.map(f => {
          const p = parseWeatherCond(f.weather_condition);
          return `
          <div class="forecast-card">
            <div class="fc-time">${f.forecast_date ? f.forecast_date.slice(5,10) : ''} ${String(p.hour).padStart(2,'0')}시</div>
            <div class="fc-icon">${skyIcon(p.sky)}</div>
            <div class="fc-temp">${f.temperature != null ? f.temperature + '°' : '-'}</div>
            <div class="fc-rain">💧 ${p.prob}% ${f.precipitation ? f.precipitation + 'mm' : ''}</div>
          </div>`;
        }).join('');
      });
      document.getElementById('weatherForecast').innerHTML = html;
    }

    function renderAIPredictions(predictions) {
      if (!predictions.length) {
        document.getElementById('aiPredTable').innerHTML = '<p style="color:#888;font-size:0.85rem;">AI 예측 데이터 없음</p>';
        return;
      }
      // Latest prediction per station
      const latest = {};
      predictions.forEach(p => { if (p.station && !latest[p.station]) latest[p.station] = p; });
      const stations = Object.values(latest).sort((a,b) => (b.predicted_ratio||0) - (a.predicted_ratio||0));

      const statusKr = { safe: '안전', caution: '관심', warning: '주의', danger: '위험' };

      const ctx = document.getElementById('aiPredChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: stations.map(s => s.river || s.station),
          datasets: [{
            label: '예측 수위비 (%)',
            data: stations.map(s => ((s.predicted_ratio || 0) * 100).toFixed(1)),
            backgroundColor: stations.map(s => {
              const st = s.predicted_status;
              if (st === 'danger') return '#e74c3c88';
              if (st === 'warning') return '#e67e2288';
              if (st === 'caution') return '#f39c1288';
              return '#7873f588';
            }),
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: '#1a1a28' }, ticks: { color: '#888', callback: v => v + '%' } },
            x: { grid: { display: false }, ticks: { color: '#ccc', maxRotation: 45 } },
          }
        }
      });

      const tbl = document.getElementById('aiPredTable');
      tbl.innerHTML = `<thead><tr><th>관측소</th><th>하천</th><th>예측시간</th><th>예측수위비</th><th>예측상태</th><th>신뢰도</th><th>예측시점</th></tr></thead><tbody>`
        + stations.map(p => `<tr>
          <td>${p.station||''}</td>
          <td>${p.river||''}</td>
          <td>+${p.prediction_hour||'?'}h</td>
          <td>${p.predicted_ratio != null ? (p.predicted_ratio * 100).toFixed(1) + '%' : '-'}</td>
          <td><span class="status-dot ${p.predicted_status||'safe'}"></span>${statusKr[p.predicted_status] || p.predicted_status || '-'}</td>
          <td>${p.confidence != null ? (p.confidence * 100).toFixed(0) + '%' : '-'}</td>
          <td>${(p.predicted_at||'').slice(0,16).replace('T',' ')}</td>
        </tr>`).join('') + '</tbody>';
    }

    function renderAIVerification(predictions, readings, mapeResult) {
      const { pairs, mape, count } = mapeResult;

      if (!count) {
        document.getElementById('aiVerifyStats').innerHTML = '<p style="color:#888;font-size:0.85rem;">검증 가능한 예측-실측 쌍 없음</p>';
        return;
      }

      // Chart: predicted vs actual scatter
      const ctx = document.getElementById('aiVerifyChart').getContext('2d');
      const maxVal = Math.max(...pairs.map(p => Math.max(p.predicted, p.actual))) * 100;
      new Chart(ctx, {
        type: 'scatter',
        data: {
          datasets: [{
            label: '예측 vs 실측',
            data: pairs.map(p => ({ x: p.actual * 100, y: p.predicted * 100 })),
            backgroundColor: '#7873f5aa',
            borderColor: '#7873f5',
            pointRadius: 5,
          }, {
            label: '완벽한 예측선',
            data: [{ x: 0, y: 0 }, { x: maxVal, y: maxVal }],
            type: 'line',
            borderColor: '#2ecc7166',
            borderDash: [5, 5],
            borderWidth: 2,
            pointRadius: 0,
            fill: false,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#ccc' } } },
          scales: {
            x: { title: { display: true, text: '실측 수위비 (%)', color: '#888' }, grid: { color: '#1a1a28' }, ticks: { color: '#888' } },
            y: { title: { display: true, text: '예측 수위비 (%)', color: '#888' }, grid: { color: '#1a1a28' }, ticks: { color: '#888' } },
          }
        }
      });

      const accuracy = mape < 10 ? '우수' : mape < 20 ? '양호' : mape < 30 ? '보통' : '개선필요';
      const accCls = mape < 10 ? 'good' : mape < 20 ? '' : 'alert';
      document.getElementById('aiVerifyStats').innerHTML = `
        <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-top:0.8rem;">
          <div class="stat-card ${accCls}" style="flex:1;min-width:120px;">
            <div class="value">${mape.toFixed(1)}%</div>
            <div class="label">MAPE</div>
          </div>
          <div class="stat-card" style="flex:1;min-width:120px;">
            <div class="value">${count}</div>
            <div class="label">검증 쌍 수</div>
          </div>
          <div class="stat-card ${accCls}" style="flex:1;min-width:120px;">
            <div class="value">${accuracy}</div>
            <div class="label">정확도 등급</div>
          </div>
        </div>
      `;
    }

    function renderKSAFE(latestRisk) {
      const rivers = Object.entries(latestRisk).sort((a,b) => (b[1].composite_score||0) - (a[1].composite_score||0));

      if (!rivers.length) {
        document.getElementById('ksafeTable').innerHTML = '<p style="color:#888;font-size:0.85rem;">K-SAFE 데이터 없음</p>';
        return;
      }

      const riskColor = (score) => {
        if (score >= 80) return '#e74c3c';
        if (score >= 60) return '#e67e22';
        if (score >= 40) return '#f39c12';
        return '#2ecc71';
      };

      const ctx = document.getElementById('ksafeChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: rivers.map(([r]) => r),
          datasets: [
            { label: '수위', data: rivers.map(([,r]) => r.w1_water_level || 0), backgroundColor: '#3498db88', borderRadius: 4 },
            { label: '기상', data: rivers.map(([,r]) => r.w2_weather || 0), backgroundColor: '#9b59b688', borderRadius: 4 },
            { label: 'AI예측', data: rivers.map(([,r]) => r.w3_prediction || 0), backgroundColor: '#e67e2288', borderRadius: 4 },
            { label: '이력', data: rivers.map(([,r]) => r.w4_history || 0), backgroundColor: '#1abc9c88', borderRadius: 4 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#ccc' } } },
          scales: {
            y: { beginAtZero: true, max: 100, grid: { color: '#1a1a28' }, ticks: { color: '#888' } },
            x: { grid: { display: false }, ticks: { color: '#ccc', maxRotation: 45 } },
          }
        }
      });

      const gradeKr = { low: '낮음', moderate: '보통', high: '높음', very_high: '매우높음', critical: '심각' };
      const tbl = document.getElementById('ksafeTable');
      tbl.innerHTML = `<thead><tr><th>하천</th><th>종합점수</th><th>위험등급</th><th>수위</th><th>기상</th><th>AI예측</th><th>이력</th><th>교차검증</th><th>추세</th></tr></thead><tbody>`
        + rivers.map(([r, d]) => `<tr>
          <td>${r}</td>
          <td><span style="color:${riskColor(d.composite_score)};font-weight:700;">${(d.composite_score||0).toFixed(1)}</span></td>
          <td><span class="grade-badge" style="background:${riskColor(d.composite_score)}33;color:${riskColor(d.composite_score)}">${d.risk_grade ? gradeKr[d.risk_grade] || d.risk_grade : '-'}</span></td>
          <td>${(d.w1_water_level||0).toFixed(0)}</td>
          <td>${(d.w2_weather||0).toFixed(0)}</td>
          <td>${(d.w3_prediction||0).toFixed(0)}</td>
          <td>${(d.w4_history||0).toFixed(0)}</td>
          <td>${d.cross_validation ? '✅' : '❌'}</td>
          <td>${d.trend_direction || '-'}</td>
        </tr>`).join('') + '</tbody>';

      // 4R Resilience summary (average across all rivers)
      const r4keys = ['resilience_robustness', 'resilience_redundancy', 'resilience_resourcefulness', 'resilience_rapidity'];
      const r4labels = ['견고성', '중복성', '자원성', '신속성'];
      const r4avgs = r4keys.map(k => {
        const vals = rivers.map(([,d]) => d[k]).filter(v => v != null);
        return vals.length ? (vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1) : 'N/A';
      });

      document.getElementById('ksafeResilience').innerHTML = `
        <h4 style="font-size:0.85rem;color:#aaa;margin:1rem 0 0.5rem;">4R 회복탄력성 (전체 평균)</h4>
        <div class="resilience-grid">
          ${r4labels.map((label, i) => `
            <div class="r4-item">
              <div class="r4-val">${r4avgs[i]}</div>
              <div class="r4-label">${label}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderRecommendations(avgEhi, invasiveCount, dangerCount, wqStations, allDO, avgKsafe, mapeResult) {
      const recs = [];
      const ehi = parseFloat(avgEhi);

      if (ehi < 40) recs.push({ p: 'urgent', text: `평균 EHI ${avgEhi}점 — 긴급 생태복원 사업 검토 필요` });
      else if (ehi < 60) recs.push({ p: 'warning', text: `평균 EHI ${avgEhi}점 — 지속적 모니터링 강화 권고` });
      else recs.push({ p: 'ok', text: `평균 EHI ${avgEhi}점 — 현행 관리 체계 유지` });

      if (invasiveCount > 0) recs.push({ p: 'warning', text: `외래종 ${invasiveCount}건 감지 — 생태교란종 제거 작업 시행 필요` });

      const lowDO = allDO.some(v => v < 5.0);
      if (lowDO) recs.push({ p: 'urgent', text: '용존산소(DO) 5.0mg/L 미만 관측 — 수질 개선 조치 시급' });

      if (dangerCount >= 3) recs.push({ p: 'urgent', text: `위험 관측소 ${dangerCount}개소 — 하천 범람 대비 점검 시급` });

      // K-SAFE recommendations
      const ksafe = parseFloat(avgKsafe);
      if (!isNaN(ksafe)) {
        if (ksafe >= 70) recs.push({ p: 'urgent', text: `K-SAFE 평균 ${avgKsafe}점 — 홍수 위험 단계 격상, 긴급 대응 체계 가동 필요` });
        else if (ksafe >= 40) recs.push({ p: 'warning', text: `K-SAFE 평균 ${avgKsafe}점 — 하천별 맞춤 모니터링 주기 단축 권고` });
        else recs.push({ p: 'ok', text: `K-SAFE 평균 ${avgKsafe}점 — 홍수 위험도 안정, 정기 점검 유지` });
      }

      // AI prediction accuracy recommendations
      if (mapeResult && mapeResult.mape !== null) {
        const mape = mapeResult.mape;
        if (mape > 30) recs.push({ p: 'urgent', text: `AI 예측 MAPE ${mape.toFixed(1)}% — 모델 재학습 및 데이터 품질 점검 시급` });
        else if (mape > 15) recs.push({ p: 'warning', text: `AI 예측 MAPE ${mape.toFixed(1)}% — 모델 파라미터 튜닝 권고` });
        else recs.push({ p: 'ok', text: `AI 예측 MAPE ${mape.toFixed(1)}% — 예측 모델 정확도 양호` });
      }

      if (!recs.length) recs.push({ p: 'ok', text: '전체적으로 양호한 상태, 정기 모니터링 유지 권고' });

      const pLabel = { urgent: '긴급', warning: '주의', ok: '양호' };
      document.getElementById('recList').innerHTML = recs.map(r =>
        `<li class="rec-item ${r.p}">
          <span class="rec-priority ${r.p}">${pLabel[r.p]}</span>
          <span>${r.text}</span>
        </li>`
      ).join('');
    }

    loadReport();
  </script>
  <script src="gate.js"></script>
</body>
