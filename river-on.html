<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>하천ON — 수변 문화재 방재 지도</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Pretendard', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0a0a1a 100%);
      padding: 0.8rem 1.2rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
      position: relative;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: #f5a623; }
    header h1 em { font-style: normal; color: #7873f5; font-size: 0.8rem; }
    .nav-links { display: flex; gap: 1rem; }
    .nav-links a { color: #888; text-decoration: none; font-size: 0.82rem; }
    .nav-links a:hover { color: #f5a623; }

    .controls {
      position: absolute;
      top: 60px;
      right: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .legend {
      background: rgba(10,10,15,0.92);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 0.75rem;
      min-width: 180px;
    }
    .legend h3 { font-size: 0.8rem; margin-bottom: 0.5rem; color: #ccc; }
    .legend-item { display: flex; align-items: center; gap: 0.5rem; margin: 0.3rem 0; }
    .legend-dot {
      width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0;
    }
    .legend-line {
      width: 12px; height: 3px; flex-shrink: 0; border-radius: 2px;
    }

    .stats-bar {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .stat-card {
      background: rgba(10,10,15,0.92);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.6rem 1rem;
      text-align: center;
      min-width: 110px;
    }
    .stat-card .num {
      font-size: 1.4rem;
      font-weight: 800;
    }
    .stat-card .label {
      font-size: 0.7rem;
      color: #888;
      margin-top: 0.15rem;
    }
    .num.danger { color: #ff4757; }
    .num.warning { color: #f5a623; }
    .num.safe { color: #2ecc71; }
    .num.heritage { color: #f5a623; }
    .num.total { color: #7873f5; }

    #map {
      width: 100%;
      height: calc(100vh - 50px);
    }

    .filter-bar {
      position: absolute;
      top: 60px;
      left: 12px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }
    .filter-btn {
      background: rgba(10,10,15,0.92);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 0.5rem 0.8rem;
      color: #ccc;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: #f5a623; }
    .filter-btn.active { border-color: #f5a623; color: #f5a623; background: rgba(245,166,35,0.1); }

    .popup-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .popup-grade { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; font-weight: 600; margin-bottom: 0.3rem; }
    .popup-grade.national { background: #ff4757; color: #fff; }
    .popup-grade.treasure { background: #f5a623; color: #000; }
    .popup-grade.site { background: #3498db; color: #fff; }
    .popup-grade.other { background: #555; color: #fff; }
    .popup-info { font-size: 0.78rem; color: #444; line-height: 1.5; }

    .river-popup-status { font-weight: 700; padding: 0.15rem 0.5rem; border-radius: 4px; font-size: 0.7rem; }
    .river-popup-status.danger { background: #ff4757; color: #fff; }
    .river-popup-status.warning { background: #f5a623; color: #000; }
    .river-popup-status.safe { background: #2ecc71; color: #000; }

    .loading-overlay {
      position: absolute;
      top: 50px; left: 0; right: 0; bottom: 0;
      background: rgba(10,10,15,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      font-size: 1rem;
      color: #888;
    }

    @keyframes pulse-danger {
      0%, 100% { box-shadow: 0 0 6px #ff475788; transform: scale(1); }
      50% { box-shadow: 0 0 18px #ff4757cc; transform: scale(1.4); }
    }
    .pulse-marker { animation: pulse-danger 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
<script src="gate.js"></script>
  <header>
    <h1><span>하천ON</span> 수변 문화재 방재 지도 <em>powered by RiverWatch</em></h1>
    <div class="nav-links">
      <a href="dashboard">RiverWatch</a>
      <a href="platform">플랫폼</a>
    </div>
  </header>

  <div id="loading" class="loading-overlay">데이터 로딩 중...</div>
  <div id="map"></div>

  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all" onclick="toggleFilter(this)">전체 보기</button>
    <button class="filter-btn" data-filter="danger" onclick="toggleFilter(this)">🔴 위험 구역</button>
    <button class="filter-btn" data-filter="national" onclick="toggleFilter(this)">🏛️ 국보·보물</button>
    <button class="filter-btn" data-filter="close" onclick="toggleFilter(this)">⚠️ 500m 이내</button>
  </div>

  <div class="controls">
    <div class="legend">
      <h3>범례</h3>
      <div class="legend-item"><div class="legend-dot" style="background:#ff4757"></div> 수위 위험 관측소</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f5a623"></div> 수위 주의 관측소</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div> 수위 안전 관측소</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e74c3c; border: 2px solid #fff"></div> 국보</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f39c12; border: 2px solid #fff"></div> 보물</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3498db; border: 2px solid #fff"></div> 사적</div>
      <div class="legend-item"><div class="legend-dot" style="background:#95a5a6; border: 2px solid #fff"></div> 기타 문화재</div>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="num total" id="sTotalAssets">-</div><div class="label">수변 문화재</div></div>
    <div class="stat-card"><div class="num danger" id="sDanger">-</div><div class="label">위험 관측소</div></div>
    <div class="stat-card"><div class="num warning" id="sWarning">-</div><div class="label">주의 관측소</div></div>
    <div class="stat-card"><div class="num safe" id="sSafe">-</div><div class="label">안전 관측소</div></div>
    <div class="stat-card"><div class="num heritage" id="sHighRisk">-</div><div class="label">고위험 문화재</div></div>
    <div class="stat-card"><div class="num" id="sRainMax" style="color:#5bc0de">-</div><div class="label">최대 강수확률</div></div>
    <div class="stat-card"><div class="num" id="sFloodRisk" style="color:#888">-</div><div class="label">침수위험도</div></div>
  </div>

  <div id="alertPanel" style="display:none;position:absolute;top:60px;left:50%;transform:translateX(-50%);z-index:1001;max-width:480px;width:90%">
    <div style="background:rgba(255,71,87,0.95);border-radius:12px;padding:0.8rem 1rem;color:#fff;font-size:0.82rem;box-shadow:0 4px 20px rgba(255,71,87,0.4)">
      <div style="font-weight:700;font-size:0.9rem;margin-bottom:0.4rem" id="alertTitle"></div>
      <div id="alertBody" style="line-height:1.6"></div>
      <button onclick="this.parentElement.parentElement.style.display='none'" style="position:absolute;top:8px;right:12px;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer">&times;</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://tpnikydhphhpwtksxanm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRwbmlreWRocGhocHd0a3N4YW5tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0OTM0MjYsImV4cCI6MjA5ODA2OTQyNn0.Bv036PwqF9lRyZgYQlt-WFMd6BCDv4JEmvq--hVhscY';
    const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

    const STATION_COORDS = {
      "여수대교": [37.4980, 127.0680],
      "대곡교": [37.4760, 127.0720],
      "탄천2교": [37.5100, 127.0650],
      "증산교": [37.5820, 126.9180],
      "성산2교": [37.5670, 126.9250],
      "고척교": [37.4950, 126.8580],
      "도림교": [37.4900, 126.9230],
      "광화교": [37.4730, 126.8500],
      "기아대교": [37.4640, 126.8950],
      "신대방역": [37.4880, 126.9170],
      "양산교": [37.4780, 126.9350],
      "봉은교": [37.5150, 127.0600],
      "모래말옆": [37.6530, 127.0300],
      "노원교": [37.6400, 127.0500],
      "계성교": [37.6480, 127.0180],
      "장월교": [37.6350, 127.0100],
      "신의교": [37.6200, 127.0550],
      "월계1교": [37.6250, 127.0480],
      "용두교": [37.5880, 127.0050],
      "성동교": [37.5650, 127.0400],
      "마장2교": [37.5680, 127.0250],
    };

    async function query(table, params = '') {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, { headers });
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    }

    const map = L.map('map', { zoomControl: false }).setView([37.545, 126.98], 12);
    L.control.zoom({ position: 'topright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 19
    }).addTo(map);

    let allAssetMarkers = [];
    let allStationMarkers = [];
    let riverReadings = [];

    function gradeColor(grade) {
      if (grade === '국보') return '#e74c3c';
      if (grade === '보물') return '#f39c12';
      if (grade === '사적' || grade === '사적및명승') return '#3498db';
      if (grade === '천연기념물') return '#2ecc71';
      return '#95a5a6';
    }

    function gradeClass(grade) {
      if (grade === '국보') return 'national';
      if (grade === '보물') return 'treasure';
      if (grade === '사적' || grade === '사적및명승') return 'site';
      return 'other';
    }

    function statusColor(status) {
      if (status === 'danger') return '#ff4757';
      if (status === 'warning') return '#f5a623';
      return '#2ecc71';
    }

    function statusLabel(status) {
      if (status === 'danger') return '위험';
      if (status === 'warning') return '주의';
      return '안전';
    }

    function makeAssetIcon(grade, riskLevel) {
      const color = gradeColor(grade);
      const size = (grade === '국보' || grade === '보물') ? 12 : 9;
      const border = riskLevel === 'danger' ? '3px solid #ff4757' :
                     riskLevel === 'warning' ? '2px solid #f5a623' : '2px solid rgba(255,255,255,0.6)';
      const pulseClass = riskLevel === 'danger' ? 'pulse-marker' : '';
      return L.divIcon({
        className: '',
        html: `<div class="${pulseClass}" style="width:${size}px;height:${size}px;background:${color};border-radius:50%;border:${border};box-shadow:0 0 6px ${color}88;"></div>`,
        iconSize: [size, size],
        iconAnchor: [size/2, size/2],
      });
    }

    function makeStationIcon(status) {
      const color = statusColor(status);
      return L.divIcon({
        className: '',
        html: `<div style="width:18px;height:18px;background:${color};border-radius:50%;border:3px solid rgba(0,0,0,0.4);box-shadow:0 0 12px ${color}aa;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:800;">💧</div>`,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      });
    }

    function getNearestStationStatus(lat, lng) {
      let minDist = Infinity;
      let status = 'safe';
      for (const r of riverReadings) {
        if (!r.latitude || !r.longitude) continue;
        const d = Math.sqrt((r.latitude - lat)**2 + (r.longitude - lng)**2);
        if (d < minDist) {
          minDist = d;
          status = r.status || 'safe';
        }
      }
      return status;
    }

    async function loadData() {
      const now = new Date();
      const nowHour = now.getHours();
      const todayStr = now.toISOString().slice(0, 10);

      const [assets, readings, weather] = await Promise.all([
        query('cultural_assets', 'select=name,grade,nearest_river,distance_km,latitude,longitude,risk_priority&order=risk_priority.desc&limit=500'),
        query('river_readings', 'select=station,river,gu,water_level,embankment_height,level_ratio,status,measured_at&order=measured_at.desc&limit=50'),
        query('weather_forecasts', `select=river,forecast_hour,rain_probability,rain_amount,sky_status&forecast_date=eq.${todayStr}&order=forecast_hour.asc&limit=500`),
      ]);

      const weatherByRiver = {};
      let globalMaxRain = 0;
      for (const w of weather) {
        const h = parseInt(w.forecast_hour);
        if (h >= nowHour) {
          if (!weatherByRiver[w.river]) weatherByRiver[w.river] = [];
          weatherByRiver[w.river].push(w);
          if (w.rain_probability > globalMaxRain) globalMaxRain = w.rain_probability;
        }
      }

      riverReadings = readings;

      const stationMap = new Map();
      for (const r of readings) {
        if (!stationMap.has(r.station)) stationMap.set(r.station, r);
      }

      let dangerCount = 0, warningCount = 0, safeCount = 0;
      for (const [, r] of stationMap) {
        const coords = STATION_COORDS[r.station];
        const lat = coords ? coords[0] : null;
        const lng = coords ? coords[1] : null;
        const ratio = r.level_ratio || 0;
        const status = ratio >= 80 ? 'danger' : ratio >= 50 ? 'warning' : 'safe';

        if (status === 'danger') dangerCount++;
        else if (status === 'warning') warningCount++;
        else safeCount++;

        if (!lat || !lng) continue;

        r.latitude = lat;
        r.longitude = lng;
        r.status = status;
        const marker = L.marker([lat, lng], { icon: makeStationIcon(status) });
        const ratioStr = r.level_ratio ? r.level_ratio.toFixed(1) : '?';
        const rw = weatherByRiver[r.river] || [];
        const maxRainProb = rw.length ? Math.max(...rw.map(w => w.rain_probability)) : 0;
        const nextRain = rw.find(w => w.rain_probability >= 50);
        const weatherLine = maxRainProb > 0
          ? `<br>🌧️ 강수확률: 최대 ${maxRainProb}%${nextRain ? ` (${nextRain.forecast_hour} ${nextRain.sky_status})` : ''}`
          : '<br>☀️ 강수 예보 없음';
        marker.bindPopup(`
          <div style="min-width:200px">
            <div class="popup-title">💧 ${r.station}</div>
            <div><span class="river-popup-status ${status}">${statusLabel(status)}</span></div>
            <div class="popup-info" style="margin-top:6px">
              하천: ${r.river || '-'}<br>
              수위: ${r.water_level || '-'}cm / 제방: ${r.embankment_height || '-'}cm<br>
              수위비율: ${ratioStr}%${weatherLine}<br>
              측정: ${r.measured_at ? new Date(r.measured_at).toLocaleString('ko') : '-'}
            </div>
          </div>
        `);
        marker.stationData = r;
        marker.addTo(map);
        allStationMarkers.push(marker);

        if (status === 'danger') {
          L.circle([lat, lng], {
            radius: 1000, color: '#ff4757', fillColor: '#ff4757',
            fillOpacity: 0.08, weight: 1, dashArray: '5,5'
          }).addTo(map);
        }
      }

      let highRisk = 0;
      const dangerAssets = [];

      for (const a of assets) {
        if (!a.latitude || !a.longitude) continue;

        const nearestStatus = getNearestStationStatus(a.latitude, a.longitude);
        const riverWeather = weatherByRiver[a.nearest_river] || [];
        const maxRain = riverWeather.length ? Math.max(...riverWeather.map(w => w.rain_probability)) : 0;

        let proximityScore = a.distance_km <= 0.3 ? 40 : a.distance_km <= 0.5 ? 30 : a.distance_km <= 1.0 ? 15 : 5;
        let stationScore = nearestStatus === 'danger' ? 40 : nearestStatus === 'warning' ? 20 : 0;
        let rainScore = maxRain >= 80 ? 20 : maxRain >= 60 ? 12 : maxRain >= 40 ? 6 : 0;
        const gradeBonus = (a.grade === '국보') ? 10 : (a.grade === '보물') ? 5 : 0;
        const riskScore = Math.min(100, proximityScore + stationScore + rainScore + gradeBonus);

        const riskLevel = riskScore >= 60 ? 'danger' : riskScore >= 35 ? 'warning' : 'safe';

        if (riskLevel === 'danger' || ((a.grade === '국보' || a.grade === '보물' || a.grade === '사적') && a.distance_km <= 1.0 && nearestStatus !== 'safe')) {
          highRisk++;
        }
        if (riskLevel === 'danger') {
          dangerAssets.push({ name: a.name, grade: a.grade, river: a.nearest_river, distance: a.distance_km, score: riskScore });
        }

        a.riskLevel = riskLevel;
        a.riskScore = riskScore;

        const marker = L.marker([a.latitude, a.longitude], {
          icon: makeAssetIcon(a.grade, riskLevel)
        });

        const riskLabel = riskScore >= 60 ? '🔴 위험' : riskScore >= 35 ? '🟡 주의' : '🟢 안전';
        marker.bindPopup(`
          <div style="min-width:220px">
            <div class="popup-title">${a.name}</div>
            <div><span class="popup-grade ${gradeClass(a.grade)}">${a.grade}</span></div>
            <div class="popup-info" style="margin-top:6px">
              인접 하천: ${a.nearest_river || '-'} (${a.distance_km}km)<br>
              인접관측소 상태: <span class="river-popup-status ${nearestStatus}">${statusLabel(nearestStatus)}</span><br>
              강수확률: ${maxRain}%<br>
              <b>복합 위험도: ${riskLabel} (${riskScore}점)</b>
            </div>
          </div>
        `);

        marker.assetData = a;
        marker.addTo(map);
        allAssetMarkers.push(marker);
      }

      if (dangerAssets.length > 0) {
        const alertPanel = document.getElementById('alertPanel');
        document.getElementById('alertTitle').textContent = `⚠️ ${dangerAssets.length}건 문화재 침수 위험 경보`;
        document.getElementById('alertBody').innerHTML = dangerAssets.slice(0, 5).map(d =>
          `<b>${d.name}</b> (${d.grade}) — ${d.river} ${d.distance}km, 위험도 ${d.score}점`
        ).join('<br>');
        alertPanel.style.display = 'block';
      }

      document.getElementById('sTotalAssets').textContent = assets.length;
      document.getElementById('sDanger').textContent = dangerCount;
      document.getElementById('sWarning').textContent = warningCount;
      document.getElementById('sSafe').textContent = safeCount;
      document.getElementById('sHighRisk').textContent = highRisk;
      const rainEl = document.getElementById('sRainMax');
      rainEl.textContent = globalMaxRain + '%';
      if (globalMaxRain >= 80) { rainEl.style.color = '#ff4757'; }
      else if (globalMaxRain >= 60) { rainEl.style.color = '#f5a623'; }
      else { rainEl.style.color = '#2ecc71'; }

      const allScores = allAssetMarkers.map(m => m.assetData.riskScore || 0);
      const avgRisk = allScores.length ? Math.round(allScores.reduce((a,b) => a+b, 0) / allScores.length) : 0;
      const floodEl = document.getElementById('sFloodRisk');
      floodEl.textContent = avgRisk + '점';
      if (avgRisk >= 60) { floodEl.style.color = '#ff4757'; }
      else if (avgRisk >= 35) { floodEl.style.color = '#f5a623'; }
      else { floodEl.style.color = '#2ecc71'; }

      document.getElementById('loading').style.display = 'none';
    }

    function toggleFilter(btn) {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const filter = btn.dataset.filter;

      allAssetMarkers.forEach(m => {
        const a = m.assetData;
        let show = true;
        if (filter === 'danger') {
          show = a.riskLevel === 'danger' || a.riskLevel === 'warning';
        } else if (filter === 'national') {
          show = a.grade === '국보' || a.grade === '보물';
        } else if (filter === 'close') {
          show = a.distance_km <= 0.5;
        }
        m.setOpacity(show ? 1 : 0.1);
      });
    }

    loadData();
  </script>
</body>
</html>
