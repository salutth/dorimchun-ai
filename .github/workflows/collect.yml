name: RiverWatch Data Collector

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      HRFCO_API_KEY: ${{ secrets.HRFCO_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 수위 모니터링 (지류)
        run: python river_monitor.py
        continue-on-error: true

      - name: 한강 본류 수위
        run: python collectors/hangang_monitor.py
        continue-on-error: true

      - name: 생물 관찰 수집
        run: python collectors/species.py
        continue-on-error: true

      - name: EHI 생태건강지수
        run: python collectors/ehi.py
        continue-on-error: true

      - name: 외래종 경보
        run: python collectors/invasive_alert.py
        continue-on-error: true

      - name: 문화재 수집
        run: python collectors/cultural_assets.py
        continue-on-error: true

      - name: 기상 예보
        run: python collectors/weather.py
        continue-on-error: true

      - name: 수질 TMS
        run: python collectors/water_quality.py
        continue-on-error: true
