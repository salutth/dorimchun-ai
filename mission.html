<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>RiverWatch — 관찰 미션</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Pretendard', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0a0a1a 100%);
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: #7873f5; }
    .nav-links { display: flex; gap: 1rem; }
    .nav-links a { color: #666; text-decoration: none; font-size: 0.82rem; }

    .container { max-width: 520px; margin: 0 auto; padding: 1.2rem; }

    /* Mission Banner */
    .mission-banner {
      background: linear-gradient(135deg, #1a1040 0%, #12121a 100%);
      border: 1px solid #2a2050;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
    }
    .mission-banner::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 40%, #7873f510 0%, transparent 50%);
    }
    .mission-banner .week {
      font-size: 0.75rem;
      color: #7873f5;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      position: relative;
    }
    .mission-banner h2 {
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 0.3rem;
      position: relative;
    }
    .mission-banner .desc {
      font-size: 0.82rem;
      color: #888;
      position: relative;
    }

    /* Progress Ring */
    .progress-section {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      padding: 1.2rem;
      margin-bottom: 1rem;
    }
    .ring-wrapper {
      position: relative;
      width: 90px;
      height: 90px;
      flex-shrink: 0;
    }
    .ring-wrapper svg { transform: rotate(-90deg); }
    .ring-bg { stroke: #1a1a28; }
    .ring-fill { stroke: #7873f5; transition: stroke-dashoffset 1s ease; stroke-linecap: round; }
    .ring-text {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-text .num { font-size: 1.5rem; font-weight: 800; color: #7873f5; }
    .ring-text .label { font-size: 0.65rem; color: #666; }
    .progress-info h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.3rem; }
    .progress-info p { font-size: 0.78rem; color: #888; line-height: 1.5; }

    /* Species checklist */
    .section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #aaa;
      margin: 1.2rem 0 0.6rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .checklist { list-style: none; }
    .checklist li {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 0.8rem;
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 10px;
      margin-bottom: 0.5rem;
      transition: all 0.2s;
    }
    .checklist li.found {
      border-color: #2ecc7144;
      background: #2ecc7108;
    }
    .checklist li .check {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #2a2a3a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.7rem;
      color: transparent;
      transition: all 0.3s;
    }
    .checklist li.found .check {
      background: #2ecc71;
      border-color: #2ecc71;
      color: #fff;
    }
    .checklist li .species-info { flex: 1; }
    .checklist li .species-name {
      font-size: 0.85rem;
      font-weight: 600;
    }
    .checklist li.found .species-name { color: #2ecc71; }
    .checklist li .species-hint {
      font-size: 0.72rem;
      color: #555;
      margin-top: 1px;
    }
    .checklist li.found .species-hint { color: #2ecc7188; }
    .checklist li .finder {
      font-size: 0.7rem;
      color: #7873f5;
      background: #7873f515;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* Leaderboard */
    .leaderboard {
      background: #12121a;
      border: 1px solid #2a2a3a;
      border-radius: 14px;
      overflow: hidden;
    }
    .leaderboard .lb-header {
      padding: 0.7rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      border-bottom: 1px solid #1a1a28;
      color: #aaa;
    }
    .leaderboard .lb-row {
      display: flex;
      align-items: center;
      padding: 0.6rem 1rem;
      gap: 0.7rem;
      border-bottom: 1px solid #0a0a0f;
    }
    .leaderboard .lb-row:last-child { border-bottom: none; }
    .lb-rank {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .lb-rank.gold { background: #f39c1233; color: #f39c12; }
    .lb-rank.silver { background: #aaa3; color: #aaa; }
    .lb-rank.bronze { background: #cd7f3233; color: #cd7f32; }
    .lb-rank.normal { background: #1a1a28; color: #666; }
    .lb-name { flex: 1; font-size: 0.82rem; }
    .lb-count { font-size: 0.82rem; font-weight: 700; color: #7873f5; }

    /* CTA */
    .cta-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #0a0a0fee;
      border-top: 1px solid #222;
      padding: 0.8rem 1.2rem;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      backdrop-filter: blur(10px);
    }
    .cta-bar a {
      flex: 1;
      max-width: 240px;
      text-align: center;
      padding: 0.7rem;
      border-radius: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .cta-bar a:hover { opacity: 0.85; }
    .cta-primary {
      background: linear-gradient(135deg, #7873f5, #6560e0);
      color: #fff;
    }
    .cta-secondary {
      background: #1a1a28;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
    }

    .spacer { height: 80px; }

    .loading {
      display: flex; align-items: center; justify-content: center;
      height: 200px; color: #555;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>RiverWatch</span> 미션</h1>
    <div class="nav-links">
      <a href="/report">제보</a>
      <a href="/dashboard">대시보드</a>
    </div>
  </header>

  <div class="container" id="content">
    <div class="loading" id="loading">미션 데이터 로딩중...</div>
  </div>

  <div class="cta-bar">
    <a href="/report" class="cta-primary">🔬 생물 제보하기</a>
    <a href="/today" class="cta-secondary">📊 오늘의 카드</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://gypkipqlkaeocrvzueek.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5cGtpcHFsa2Flb2Nydnp1ZWVrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyNTMwNzYsImV4cCI6MjA5NjgyOTA3Nn0.LTtg6J9b8DjstP-vdbssdHsRb95OBSIaC1niW-RGqyM';

    async function query(table, params) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
        }
      });
      return res.json();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s ?? '';
      return d.innerHTML;
    }

    function getWeekNumber() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 1);
      const diff = now - start;
      return Math.ceil((diff / 86400000 + start.getDay() + 1) / 7);
    }

    function getWeekRange() {
      const now = new Date();
      const day = now.getDay() || 7;
      const mon = new Date(now);
      mon.setDate(now.getDate() - day + 1);
      const sun = new Date(mon);
      sun.setDate(mon.getDate() + 6);
      const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
      return `${fmt(mon)} ~ ${fmt(sun)}`;
    }

    const MISSION_TARGETS = [
      { name: '왜가리', hint: '하천변 큰 새, 회색빛 몸' },
      { name: '잉어', hint: '물속에서 가끔 튀어오름' },
      { name: '거북', hint: '바위 위에서 일광욕' },
      { name: '백로', hint: '흰색 긴 다리 새' },
      { name: '오리', hint: '물 위에 떠서 헤엄' },
      { name: '개구리', hint: '풀숲에서 울음소리' },
      { name: '잠자리', hint: '물가 위를 비행' },
      { name: '나비', hint: '꽃 주변에서 관찰' },
      { name: '민물게', hint: '돌 아래 숨어 있음' },
      { name: '수달', hint: '매우 드묾! 목격 시 즉시 제보' },
    ];

    async function buildMission() {
      const weekNum = getWeekNumber();
      const targetCount = 10;

      const species = await query('species_observations',
        'select=taxon_name,common_name,observer,observed_at,is_invasive&order=observed_at.desc&limit=500');

      const recentSpecies = new Map();
      species.forEach(s => {
        const name = (s.taxon_name || '').toLowerCase();
        const common = (s.common_name || '').toLowerCase();
        if (!recentSpecies.has(name)) {
          recentSpecies.set(name, s);
        }
        if (common && !recentSpecies.has(common)) {
          recentSpecies.set(common, s);
        }
      });

      const uniqueSpecies = new Set();
      species.forEach(s => {
        if (s.taxon_name) uniqueSpecies.add(s.taxon_name);
      });
      const foundCount = uniqueSpecies.size;
      const progress = Math.min(foundCount / targetCount, 1);

      const observerCounts = {};
      species.forEach(s => {
        const obs = s.observer || '익명';
        observerCounts[obs] = (observerCounts[obs] || 0) + 1;
      });
      const leaderboard = Object.entries(observerCounts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 5);

      const checklist = MISSION_TARGETS.map(t => {
        let found = null;
        for (const [key, s] of recentSpecies) {
          if (key.includes(t.name) || (s.common_name || '').includes(t.name) || t.name.includes(key)) {
            found = s;
            break;
          }
        }
        return { ...t, found };
      });

      const foundMission = checklist.filter(c => c.found).length;
      const circumference = 2 * Math.PI * 38;
      const offset = circumference * (1 - foundMission / MISSION_TARGETS.length);

      let encouragement = '';
      if (foundMission === 0) encouragement = '첫 번째 생물을 찾아보세요!';
      else if (foundMission < 3) encouragement = '좋은 시작이에요! 계속 탐험하세요';
      else if (foundMission < 6) encouragement = '절반 가까이 왔어요! 대단해요';
      else if (foundMission < 10) encouragement = '거의 다 찾았어요! 조금만 더!';
      else encouragement = '🎉 미션 완료! 도림천 생태 전문가!';

      const rankClasses = ['gold', 'silver', 'bronze', 'normal', 'normal'];

      document.getElementById('content').innerHTML = `
        <div class="mission-banner">
          <div class="week">${getWeekRange()} · WEEK ${weekNum}</div>
          <h2>도림천에서 10종 찾기</h2>
          <div class="desc">도림천을 산책하며 다양한 생물을 발견해보세요</div>
        </div>

        <div class="progress-section">
          <div class="ring-wrapper">
            <svg width="90" height="90" viewBox="0 0 90 90">
              <circle class="ring-bg" cx="45" cy="45" r="38" fill="none" stroke-width="6"/>
              <circle class="ring-fill" cx="45" cy="45" r="38" fill="none" stroke-width="6"
                stroke-dasharray="${circumference}"
                stroke-dashoffset="${offset}"/>
            </svg>
            <div class="ring-text">
              <div class="num">${foundMission}</div>
              <div class="label">/ ${MISSION_TARGETS.length}</div>
            </div>
          </div>
          <div class="progress-info">
            <h3>${encouragement}</h3>
            <p>전체 관찰 종: ${foundCount}종<br>이번 미션 달성: ${foundMission}/${MISSION_TARGETS.length}</p>
          </div>
        </div>

        <div class="section-title">🎯 미션 체크리스트</div>
        <ul class="checklist">
          ${checklist.map(c => `
            <li class="${c.found ? 'found' : ''}">
              <div class="check">${c.found ? '✓' : ''}</div>
              <div class="species-info">
                <div class="species-name">${esc(c.name)}</div>
                <div class="species-hint">${c.found ? `${esc(c.found.taxon_name)} 발견!` : esc(c.hint)}</div>
              </div>
              ${c.found && c.found.observer ? `<span class="finder">${esc(c.found.observer)}</span>` : ''}
            </li>
          `).join('')}
        </ul>

        <div class="section-title">🏆 이번 달 관찰왕</div>
        <div class="leaderboard">
          <div class="lb-header">도림천 관찰 횟수 순위</div>
          ${leaderboard.length === 0 ? '<div class="lb-row"><span style="color:#555">아직 관찰 데이터가 없습니다</span></div>' :
            leaderboard.map((entry, i) => `
              <div class="lb-row">
                <div class="lb-rank ${rankClasses[i]}">${i + 1}</div>
                <div class="lb-name">${esc(entry[0])}</div>
                <div class="lb-count">${entry[1]}건</div>
              </div>
            `).join('')}
        </div>

        <div class="spacer"></div>
      `;
    }

    buildMission().catch(err => {
      document.getElementById('loading').innerHTML =
        `<div style="color:#e74c3c">로딩 실패: ${err.message}</div>`;
    });
  </script>
</body>
</html>
