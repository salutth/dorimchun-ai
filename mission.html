<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>RiverWatch — 서울하천 AI 모니터링</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, 'Pretendard', sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #0a0a1a 100%);
      padding: 1rem 1.2rem;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    header h1 span { color: #7873f5; }
    .nav-links { display: flex; gap: 1rem; }
    .nav-links a { color: #666; text-decoration: none; font-size: 0.82rem; }

    .container { max-width: 540px; margin: 0 auto; padding: 1.2rem; }

    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    .tab {
      flex: 1; text-align: center; padding: 0.6rem; border-radius: 10px;
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      background: #12121a; border: 1px solid #2a2a3a; color: #888;
      transition: all 0.2s;
    }
    .tab.active { background: #7873f520; border-color: #7873f5; color: #7873f5; }

    .mission-banner {
      background: linear-gradient(135deg, #1a1040 0%, #12121a 100%);
      border: 1px solid #2a2050;
      border-radius: 16px;
      padding: 1.5rem;
      text-align: center;
      margin-bottom: 1.2rem;
      position: relative;
      overflow: hidden;
    }
    .mission-banner::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: radial-gradient(circle at 30% 40%, #7873f510 0%, transparent 50%);
    }
    .mission-banner .week {
      font-size: 0.75rem; color: #7873f5; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 0.5rem; position: relative;
    }
    .mission-banner h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 0.3rem; position: relative; }
    .mission-banner .desc { font-size: 0.82rem; color: #888; position: relative; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .stat-card {
      background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px;
      padding: 0.8rem; text-align: center;
    }
    .stat-card .num { font-size: 1.5rem; font-weight: 800; color: #7873f5; }
    .stat-card .label { font-size: 0.7rem; color: #666; margin-top: 2px; }

    .progress-section {
      display: flex; align-items: center; gap: 1.2rem;
      background: #12121a; border: 1px solid #2a2a3a;
      border-radius: 14px; padding: 1.2rem; margin-bottom: 1rem;
    }
    .ring-wrapper { position: relative; width: 90px; height: 90px; flex-shrink: 0; }
    .ring-wrapper svg { transform: rotate(-90deg); }
    .ring-bg { stroke: #1a1a28; }
    .ring-fill { stroke: #7873f5; transition: stroke-dashoffset 1s ease; stroke-linecap: round; }
    .ring-text {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%); text-align: center;
    }
    .ring-text .num { font-size: 1.5rem; font-weight: 800; color: #7873f5; }
    .ring-text .label { font-size: 0.65rem; color: #666; }
    .progress-info h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.3rem; }
    .progress-info p { font-size: 0.78rem; color: #888; line-height: 1.5; }

    .section-title {
      font-size: 0.85rem; font-weight: 700; color: #aaa;
      margin: 1.2rem 0 0.6rem;
      display: flex; align-items: center; gap: 0.4rem;
    }

    .mission-list { list-style: none; }
    .mission-item {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.8rem; background: #12121a; border: 1px solid #2a2a3a;
      border-radius: 10px; margin-bottom: 0.5rem; transition: all 0.2s;
    }
    .mission-item.completed { border-color: #2ecc7144; background: #2ecc7108; }
    .mission-icon {
      width: 36px; height: 36px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .mission-info { flex: 1; }
    .mission-name { font-size: 0.85rem; font-weight: 600; }
    .mission-item.completed .mission-name { color: #2ecc71; }
    .mission-desc { font-size: 0.72rem; color: #555; margin-top: 2px; }
    .mission-reward {
      font-size: 0.7rem; font-weight: 700; color: #f39c12;
      background: #f39c1215; padding: 2px 8px; border-radius: 10px;
    }
    .mission-item.completed .mission-reward { color: #2ecc71; background: #2ecc7115; }

    .checklist { list-style: none; }
    .checklist li {
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.7rem 0.8rem; background: #12121a; border: 1px solid #2a2a3a;
      border-radius: 10px; margin-bottom: 0.5rem; transition: all 0.2s;
    }
    .checklist li.found { border-color: #2ecc7144; background: #2ecc7108; }
    .checklist li .check {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid #2a2a3a; display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; font-size: 0.7rem;
      color: transparent; transition: all 0.3s;
    }
    .checklist li.found .check { background: #2ecc71; border-color: #2ecc71; color: #fff; }
    .checklist li .species-info { flex: 1; }
    .checklist li .species-name { font-size: 0.85rem; font-weight: 600; }
    .checklist li.found .species-name { color: #2ecc71; }
    .checklist li .species-hint { font-size: 0.72rem; color: #555; margin-top: 1px; }
    .checklist li .finder {
      font-size: 0.7rem; color: #7873f5;
      background: #7873f515; padding: 2px 8px; border-radius: 10px;
    }

    .badge-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem;
    }
    .badge-item {
      text-align: center; padding: 0.8rem 0.3rem;
      background: #12121a; border: 1px solid #2a2a3a; border-radius: 12px;
    }
    .badge-item.earned { border-color: #7873f544; background: #7873f508; }
    .badge-item.locked { opacity: 0.4; }
    .badge-emoji { font-size: 1.5rem; }
    .badge-name { font-size: 0.65rem; color: #888; margin-top: 4px; }
    .badge-item.earned .badge-name { color: #7873f5; }

    .leaderboard {
      background: #12121a; border: 1px solid #2a2a3a;
      border-radius: 14px; overflow: hidden;
    }
    .leaderboard .lb-header {
      padding: 0.7rem 1rem; font-size: 0.82rem; font-weight: 600;
      border-bottom: 1px solid #1a1a28; color: #aaa;
    }
    .leaderboard .lb-row {
      display: flex; align-items: center;
      padding: 0.6rem 1rem; gap: 0.7rem;
      border-bottom: 1px solid #0a0a0f;
    }
    .leaderboard .lb-row:last-child { border-bottom: none; }
    .lb-rank {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
    }
    .lb-rank.gold { background: #f39c1233; color: #f39c12; }
    .lb-rank.silver { background: #aaa3; color: #aaa; }
    .lb-rank.bronze { background: #cd7f3233; color: #cd7f32; }
    .lb-rank.normal { background: #1a1a28; color: #666; }
    .lb-name { flex: 1; font-size: 0.82rem; }
    .lb-pts { font-size: 0.75rem; color: #f39c12; font-weight: 600; }
    .lb-count { font-size: 0.82rem; font-weight: 700; color: #7873f5; }

    .cta-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #0a0a0fee; border-top: 1px solid #222;
      padding: 0.8rem 1.2rem; display: flex; gap: 0.6rem;
      justify-content: center; backdrop-filter: blur(10px);
    }
    .cta-bar a {
      flex: 1; max-width: 240px; text-align: center;
      padding: 0.7rem; border-radius: 12px; font-size: 0.85rem;
      font-weight: 600; text-decoration: none; transition: opacity 0.2s;
    }
    .cta-bar a:hover { opacity: 0.85; }
    .cta-primary { background: linear-gradient(135deg, #7873f5, #6560e0); color: #fff; }
    .cta-secondary { background: #1a1a28; border: 1px solid #2a2a3a; color: #e0e0e0; }

    .spacer { height: 80px; }
    .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: #555; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <header>
    <h1><span>RiverWatch</span> 미션</h1>
    <div class="nav-links">
      <a href="/report">제보</a>
      <a href="/dashboard">대시보드</a>
    </div>
  </header>

  <div class="container">
    <div class="tabs">
      <div class="tab active" data-tab="missions">미션</div>
      <div class="tab" data-tab="water">수질</div>
      <div class="tab" data-tab="species">생물찾기</div>
      <div class="tab" data-tab="badges">배지</div>
      <div class="tab" data-tab="ranking">랭킹</div>
    </div>

    <div id="tab-missions" class="tab-content active">
      <div class="loading" id="loading-missions">미션 데이터 로딩중...</div>
    </div>
    <div id="tab-water" class="tab-content">
      <div class="mission-banner">
        <div class="week">시민과학 수질 모니터링</div>
        <h2>💧 수질 측정</h2>
        <div class="desc">하천 수질을 측정하고 기록하세요</div>
      </div>

      <div style="margin-bottom:1rem">
        <!-- 기본 정보 -->
        <div style="display:flex;gap:0.5rem;margin-bottom:0.8rem;flex-wrap:wrap">
          <select id="wqRiver" style="flex:1;min-width:120px;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.5rem 0.8rem;font-size:0.85rem;font-family:inherit">
            <option value="">하천 선택</option>
            <option>도림천</option><option>안양천</option><option>중랑천</option><option>청계천</option>
            <option>탄천</option><option>홍제천</option><option>불광천</option><option>우이천</option>
            <option>방학천</option><option>정릉천</option><option>양재천</option><option>성북천</option>
            <option>묵동천</option><option>전농천</option><option>월계천</option><option>반포천</option>
            <option>여의천</option><option>봉원천</option><option>녹번천</option><option>세곡천</option>
            <option>내부천</option><option value="한강">한강(서울)</option>
          </select>
          <input id="wqObserver" type="text" placeholder="측정자 이름" style="flex:1;min-width:100px;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.5rem 0.8rem;font-size:0.85rem;font-family:inherit">
        </div>

        <!-- 사진 -->
        <div style="margin-bottom:1rem">
          <label style="font-size:0.72rem;color:#888;display:block;margin-bottom:0.3rem">📸 측정지 사진</label>
          <div id="wqPhotoArea" onclick="document.getElementById('wqPhotoInput').click()" style="background:#12121a;border:2px dashed #2a2a3a;border-radius:10px;height:120px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;transition:border-color 0.2s">
            <div id="wqPhotoPlaceholder" style="text-align:center;color:#555;font-size:0.8rem"><div style="font-size:2rem;margin-bottom:0.3rem">📷</div>탭하여 촬영/선택</div>
            <img id="wqPhotoPreview" style="display:none;position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;border-radius:8px">
            <input type="file" id="wqPhotoInput" accept="image/*" capture="environment" style="display:none">
          </div>
        </div>

        <!-- 수질 측정값 (8항목) -->
        <div style="font-size:0.78rem;color:#aaa;font-weight:600;margin-bottom:0.4rem">수질 측정값</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0.5rem;margin-bottom:0.8rem">
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">pH (0~14)</label>
            <input id="wqPh" type="number" step="0.1" min="0" max="14" placeholder="7.0" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">DO 용존산소 (mg/L)</label>
            <input id="wqDo" type="number" step="0.1" min="0" max="20" placeholder="8.0" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">수온 (°C)</label>
            <input id="wqTemp" type="number" step="0.1" min="0" max="45" placeholder="22.0" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">탁도 (NTU)</label>
            <input id="wqTurb" type="number" step="0.1" min="0" placeholder="5.0" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">전기전도도 (µS/cm)</label>
            <input id="wqEC" type="number" step="1" min="0" placeholder="350" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">BOD (mg/L)</label>
            <input id="wqBod" type="number" step="0.1" min="0" placeholder="2.0" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">COD (mg/L)</label>
            <input id="wqCod" type="number" step="0.1" min="0" placeholder="4.0" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">SS 부유물 (mg/L)</label>
            <input id="wqSS" type="number" step="0.1" min="0" placeholder="10" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
        </div>

        <!-- 현장 관찰 -->
        <div style="font-size:0.78rem;color:#aaa;font-weight:600;margin-bottom:0.4rem">현장 관찰</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.5rem">
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">수색 (물 색깔)</label>
            <select id="wqColor" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.82rem;font-family:inherit">
              <option value="">선택</option>
              <option value="투명">투명 (맑음)</option>
              <option value="연녹">연녹색 (약간 녹조)</option>
              <option value="녹색">녹색 (녹조 심각)</option>
              <option value="황갈">황갈색 (토사 유입)</option>
              <option value="흑색">흑색 (오염 심각)</option>
              <option value="백탁">백탁 (공사 등)</option>
            </select></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">냄새</label>
            <select id="wqSmell" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.82rem;font-family:inherit">
              <option value="">선택</option>
              <option value="무취">무취</option>
              <option value="풀냄새">풀냄새/흙냄새</option>
              <option value="비린내">비린내 (녹조)</option>
              <option value="하수">하수 냄새</option>
              <option value="기름">기름/화학 냄새</option>
              <option value="악취">강한 악취</option>
            </select></div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-bottom:0.8rem">
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">유속 (흐름)</label>
            <select id="wqFlow" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.82rem;font-family:inherit">
              <option value="">선택</option>
              <option value="정체">정체 (거의 안 흐름)</option>
              <option value="완류">완류 (느리게)</option>
              <option value="보통">보통</option>
              <option value="급류">급류 (빠르게)</option>
            </select></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">쓰레기/부유물</label>
            <select id="wqTrash" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.82rem;font-family:inherit">
              <option value="">선택</option>
              <option value="없음">없음 (깨끗)</option>
              <option value="소량">소량</option>
              <option value="보통">보통 (눈에 띔)</option>
              <option value="심각">심각 (많음)</option>
            </select></div>
        </div>

        <!-- 기상 환경 -->
        <div style="font-size:0.78rem;color:#aaa;font-weight:600;margin-bottom:0.4rem">기상 환경</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0.5rem;margin-bottom:0.8rem">
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">날씨</label>
            <select id="wqWeather" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.82rem;font-family:inherit">
              <option value="">선택</option>
              <option value="맑음">☀️ 맑음</option>
              <option value="구름많음">⛅ 구름많음</option>
              <option value="흐림">☁️ 흐림</option>
              <option value="비">🌧️ 비</option>
              <option value="소나기">⛈️ 소나기</option>
              <option value="안개">🌫️ 안개</option>
            </select></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">기온 (°C)</label>
            <input id="wqAirTemp" type="number" step="0.1" placeholder="26" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>
          <div><label style="font-size:0.68rem;color:#666;display:block;margin-bottom:0.15rem">습도 (%)</label>
            <input id="wqHumidity" type="number" step="1" min="0" max="100" placeholder="65" style="width:100%;background:#12121a;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:8px;padding:0.45rem;font-size:0.9rem;font-family:inherit;text-align:center"></div>

    function classifyTaxon(taxon, common) {
      const t = (taxon + ' ' + common).toLowerCase();
      if (/aves|ardea|anas |anas$|pica |passer|columba|streptopelia|phalacrocorax|corvus|hypsipetes|phoenicurus|picus|parus|poecile|dendrocopos|cyanopica|turdus|larus|accipitr|egretta|nycticorax|mergus|aix |fulica|gallinula|charadrius|motacilla|hirundo|cecropis|aegithalos|zosterops|oriolus|falco|buteo|alcedo|halcyon|sittiparus|acrocephalus|paradoxornis|luscinia|emberiza|chloris|ninox|cuculus|eurystomus|garrulus|troglodytes/.test(t)) return 'bird';
      if (/pisces|cyprinus|zacco|actinopterygii|carassius|pseudorasbora|misgurnus|silurus|rhynchocypris|pseudogobio|pungtungia|hemibarbus|microphysogobio|coreoleuciscus|coreoperca|odontobutis|rhinogobius|acheilognathus|rhodeus|siniperca|squalidus|iksookimia|cobitis|micropterus|lepomis/.test(t)) return 'fish';
      if (/pelophylax|dryophytes|bufo|rana |lithobates|개구리|두꺼비|황소개구리/.test(t)) return 'amphibian';
      if (/takydromus|scincella|rhabdophis|oocatochus|elaphe|trachemys|거북|뱀|도마뱀/.test(t)) return 'reptile';
      if (/chironomidae|tubifex|ephemeroptera|ephemera |dugesia|physa |semisulcospira|plecoptera|trichoptera|cybister|ranatra|aquarius paludum|appasus|anax |깔따구|실지렁이|하루살이|플라나리아|물달팽이|다슬기|강도래|날도래|물방개|장구애비|소금쟁이|물자라/.test(t)) return 'benthic';
      if (/felis|lutra|수달|고양이/.test(t)) return 'mammal';
      if (/araneae|argiope|trichonephila|salticinae|thomisidae|lycosidae|parasteatoda|거미/.test(t)) return 'spider';
      if (/agaric|agaricomycetes|trametes|lycoperdon|abortiporus|mushroom|버섯/.test(t)) return 'mushroom';

      return 'insect';
    }

    async function loadAllData() {
      speciesData = await query('species_observations',
        'select=taxon_name,common_name,observer,observed_at,is_invasive,river,inaturalist_id&order=observed_at.desc&limit=1000');

      const uniqueSpecies = new Set();
      const rivers = new Set();
      const dorimSpecies = new Set();
      let invasiveCount = 0;
      let birdCount = 0, fishCount = 0;
      const observerStats = {};
      const riverSpecies = {};

      speciesData.forEach(s => {
        if (s.taxon_name) uniqueSpecies.add(s.taxon_name);
        if (s.river) {
          rivers.add(s.river);
          if (!riverSpecies[s.river]) riverSpecies[s.river] = {};
          if (s.taxon_name && !riverSpecies[s.river][s.taxon_name]) {
            riverSpecies[s.river][s.taxon_name] = s;
          }
        }
        if (s.river && s.river.includes('도림') && s.taxon_name) dorimSpecies.add(s.taxon_name);
        if (s.is_invasive) invasiveCount++;
        const cn = (s.common_name || '').toLowerCase();
        const tn = (s.taxon_name || '').toLowerCase();
        if (cn.includes('새') || cn.includes('백로') || cn.includes('왜가리') || cn.includes('오리') || tn.includes('aves')) birdCount++;
        if (cn.includes('물고기') || cn.includes('잉어') || cn.includes('붕어') || tn.includes('pisces')) fishCount++;

        const obs = s.observer || '익명';
        if (!observerStats[obs]) observerStats[obs] = { count: 0, species: new Set(), rivers: new Set() };
        observerStats[obs].count++;
        if (s.taxon_name) observerStats[obs].species.add(s.taxon_name);
        if (s.river) observerStats[obs].rivers.add(s.river);
      });

      // Build dynamic checklist from DB - group by taxon, collect all rivers
      const allSpeciesMap = {};
      speciesData.forEach(s => {
        if (!s.taxon_name) return;
        if (!allSpeciesMap[s.taxon_name]) {
          const ko = KOREAN_NAMES[s.taxon_name];
          const cn = s.common_name || '';
          const displayName = ko || (cn && /[가-힯]/.test(cn) ? cn : null) || cn || s.taxon_name;
          const cat = classifyTaxon(s.taxon_name, cn);
          allSpeciesMap[s.taxon_name] = {
            taxon: s.taxon_name, name: displayName, category: cat,
            emoji: TAXON_EMOJI[cat], rivers: new Set(), count: 0,
            invasive: s.is_invasive,
            inatId: s.inaturalist_id,
          };
        }
        allSpeciesMap[s.taxon_name].count++;
        if (s.river) allSpeciesMap[s.taxon_name].rivers.add(s.river);
      });
      MISSION_TARGETS = Object.values(allSpeciesMap).map(s => ({
        ...s, rivers: [...s.rivers].sort((a,b) => a.localeCompare(b,'ko')),
      }));
      MISSION_TARGETS.sort((a, b) => a.name.localeCompare(b.name, 'ko'));

      const checked = loadChecked();
      const checklistFound = MISSION_TARGETS.filter(t => checked.has(t.taxon)).length;

      statsCache = {
        totalSpecies: uniqueSpecies.size,
        rivers: rivers.size,
        riverList: sorted(rivers),
        riverSpecies,
        invasiveCount,
        dorimSpecies: dorimSpecies.size,
        birdCount, fishCount,
        totalObs: speciesData.length,
        checklistFound,
        observerStats,
      };

      buildMissions();
      buildSpeciesTab();
      buildBadges();
      buildRanking();
    }

    function sorted(set) { return [...set].sort((a, b) => a.localeCompare(b, 'ko')); }

    function loadChecked() {
      try { return new Set(JSON.parse(localStorage.getItem('rw_checklist') || '[]')); } catch { return new Set(); }
    }
    function saveChecked(set) {
      localStorage.setItem('rw_checklist', JSON.stringify([...set]));
    }
    function toggleSpecies(taxon) {
      const checked = loadChecked();
      if (checked.has(taxon)) checked.delete(taxon); else checked.add(taxon);
      saveChecked(checked);
      statsCache.checklistFound = MISSION_TARGETS.filter(t => checked.has(t.taxon)).length;
      buildSpeciesTab();
    }

    function buildMissions() {
      const s = statsCache;
      const completedCount = MISSIONS.filter(m => m.check(s)).length;
      const totalPts = MISSIONS.filter(m => m.check(s)).reduce((a, m) => a + m.pts, 0);

      let html = `
        <div class="mission-banner">
          <div class="week">${getWeekRange()} · 시민과학 미션</div>
          <h2>서울 하천 생태 탐험</h2>
          <div class="desc">미션을 완료하고 포인트를 모으세요</div>
        </div>
        <div class="stats-row">
          <div class="stat-card"><div class="num">${s.totalSpecies}</div><div class="label">관찰 종</div></div>
          <div class="stat-card"><div class="num">${totalPts}</div><div class="label">포인트</div></div>
          <div class="stat-card"><div class="num">${completedCount}/${MISSIONS.length}</div><div class="label">완료 미션</div></div>
        </div>
        <div class="section-title">🎯 미션 목록</div>
        <div class="mission-list">`;

        html += `<div class="mission-item ${done ? 'completed' : ''}">
          <div class="mission-icon" style="background:${done ? '#2ecc7120' : '#1a1a28'}">${m.icon}</div>
          <div class="mission-info">
            <div class="mission-name">${done ? '✓ ' : ''}${esc(m.name)}</div>
            <div class="mission-desc">${esc(m.desc)}</div>
          </div>
          <div class="mission-reward">${done ? '완료' : `+${m.pts}pt`}</div>
        </div>`;
      });

      html += '</div><div class="spacer"></div>';
      document.getElementById('tab-missions').innerHTML = html;
    }

    function buildSpeciesTab() {
      const s = statsCache;
      const checked = loadChecked();
      const riverOptions = ['전체', ...(s.riverList || [])];

      const filtered = selectedRiver === '전체'
        ? MISSION_TARGETS
        : MISSION_TARGETS.filter(t => t.rivers.includes(selectedRiver));

      const totalCount = filtered.length;
      const checkedCount = filtered.filter(t => checked.has(t.taxon)).length;
      const circumference = 2 * Math.PI * 38;
      const ratio = totalCount > 0 ? checkedCount / totalCount : 0;
      const offset = circumference * (1 - ratio);

      const categories = [...new Set(filtered.map(t => t.category))].sort();

      let html = `
        <div class="progress-section">
          <div class="ring-wrapper">
            <svg width="90" height="90" viewBox="0 0 90 90">
              <circle class="ring-bg" cx="45" cy="45" r="38" fill="none" stroke-width="6"/>
              <circle class="ring-fill" cx="45" cy="45" r="38" fill="none" stroke-width="6"
                stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
            </svg>
            <div class="ring-text">
              <div class="num">${checkedCount}</div>
              <div class="label">/ ${totalCount}</div>
            </div>
          </div>
          <div class="progress-info">
            <h3>${selectedRiver === '전체' ? '전체 하천' : selectedRiver} 조사 체크리스트</h3>
            <p>관찰한 종을 선택하세요<br>선택: ${checkedCount}종 / 전체: ${totalCount}종</p>
          </div>
        </div>
        <div class="section-title" style="justify-content:space-between;flex-wrap:wrap;gap:6px">
          <span>📋 생물종 조사 (${totalCount}종)</span>
          <div style="display:flex;gap:6px;align-items:center">
            <select id="riverFilter" onchange="filterRiver(this.value)"
              style="background:#1a1a28;color:#e0e0e0;border:1px solid #2a2a3a;border-radius:6px;padding:3px 8px;font-size:0.75rem;font-family:inherit">
              ${riverOptions.map(r => `<option value="${esc(r)}" ${r === selectedRiver ? 'selected' : ''}>${esc(r)}</option>`).join('')}
            </select>
            <button onclick="exportReport()" style="background:#2ecc71;color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:0.7rem;cursor:pointer;white-space:nowrap">
              📄 보고서 내보내기
            </button>
          </div>
        </div>
        <ul class="checklist">`;

      if (totalCount === 0) {
        html += '<li><div class="species-info"><div class="species-name" style="color:#555">이 하천에서 관찰 가능한 종이 없습니다</div></div></li>';
      } else {
        categories.forEach(cat => {
          const catSpecies = filtered.filter(t => t.category === cat);
          if (catSpecies.length === 0) return;
          const catEmoji = TAXON_EMOJI[cat] || '🔬';
          const catLabel = {bird:'조류',fish:'어류',amphibian:'양서류',reptile:'파충류',benthic:'저서생물',insect:'곤충',spider:'거미',mammal:'포유류',plant:'식물',mushroom:'균류',other:'기타'}[cat] || cat;
          html += `<li style="padding:6px 12px;background:#1a1a28;border-bottom:none"><span style="font-size:0.75rem;color:#888">${catEmoji} ${catLabel} (${catSpecies.length}종)</span></li>`;

          catSpecies.forEach(t => {
            const isChecked = checked.has(t.taxon);
            html += `<li class="${isChecked ? 'found' : ''}" onclick="toggleSpecies('${t.taxon.replace(/'/g, "\\'")}')" style="cursor:pointer">
              <div class="check" style="border:2px solid ${isChecked ? '#2ecc71' : '#444'};background:${isChecked ? '#2ecc7130' : 'transparent'};width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:0.7rem">${isChecked ? '✓' : ''}</div>
              <div class="species-info" style="flex:1;min-width:0">
                <div class="species-name">${t.emoji} ${esc(t.name)}${t.invasive ? ' <span style="color:#e74c3c;font-size:0.65rem">⚠교란종</span>' : ''}</div>
                <div class="species-hint" style="font-size:0.65rem;color:#666">${esc(t.taxon)} · ${t.rivers.slice(0,3).join(', ')}${t.rivers.length > 3 ? ' 외' : ''}</div>
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;flex-shrink:0">
                <div style="font-size:0.65rem;color:#555">${t.count}건</div>
                <a href="/report?species=${encodeURIComponent(t.name)}&taxon=${encodeURIComponent(t.taxon)}&river=${encodeURIComponent(selectedRiver === '전체' ? '' : selectedRiver)}"
                  onclick="event.stopPropagation()" style="font-size:0.6rem;color:#7873f5;text-decoration:none;padding:2px 6px;border:1px solid #7873f544;border-radius:4px">📷제보</a>
              </div>
            </li>`;
          });
        });
      }

      html += '</ul><div class="spacer"></div>';
      document.getElementById('tab-species').innerHTML = html;
    }

    function filterRiver(river) {
      selectedRiver = river;
      buildSpeciesTab();
    }

    function exportReport() {
      const checked = loadChecked();
      const filtered = selectedRiver === '전체'
        ? MISSION_TARGETS
        : MISSION_TARGETS.filter(t => t.rivers.includes(selectedRiver));
      const selected = filtered.filter(t => checked.has(t.taxon));

      if (selected.length === 0) {
        alert('선택된 종이 없습니다. 관찰한 종을 체크한 후 내보내기하세요.');
        return;
      }

      const now = new Date();
      const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
      const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      const river = selectedRiver === '전체' ? '전체 하천' : selectedRiver;

      let report = `══════════════════════════════════════\n`;
      report += `  RiverWatch 시민과학 조사 보고서\n`;
      report += `══════════════════════════════════════\n\n`;
      report += `조사일시: ${dateStr} ${timeStr}\n`;
      report += `조사지역: ${river}\n`;
      report += `관찰 종수: ${selected.length}종\n\n`;
      report += `──────────────────────────────────────\n`;
      report += `  관찰 생물종 목록\n`;
      report += `──────────────────────────────────────\n\n`;

      const cats = [...new Set(selected.map(s => s.category))].sort();
      const catLabel = {bird:'조류',fish:'어류',amphibian:'양서류',reptile:'파충류',benthic:'저서생물',insect:'곤충',spider:'거미',mammal:'포유류',plant:'식물',mushroom:'균류',other:'기타'};
      cats.forEach(cat => {
        const items = selected.filter(s => s.category === cat);
        report += `[${TAXON_EMOJI[cat] || '🔬'} ${catLabel[cat] || cat}] ${items.length}종\n`;
        items.forEach((s, i) => {
          report += `  ${i+1}. ${s.name} (${s.taxon})${s.invasive ? ' ⚠교란종' : ''}\n`;
          report += `     관찰하천: ${s.rivers.join(', ')}\n`;
        });
        report += '\n';
      });

      report += `──────────────────────────────────────\n`;
      report += `  건강한도림천을만드는주민모임 · 사회혁신교육원\n`;
      report += `  https://dorimchun-ai.pages.dev\n`;
      report += `══════════════════════════════════════\n`;

      const blob = new Blob([report], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `RiverWatch_조사보고서_${river}_${dateStr}.txt`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

          <h2>획득 배지 ${earnedCount} / ${BADGES.length}</h2>

        <div class="badge-grid">`;

        const earned = b.need(s);
        html += `<div class="badge-item ${earned ? 'earned' : 'locked'}">
          <div class="badge-emoji">${b.emoji}</div>
          <div class="badge-name">${esc(b.name)}</div>
          <div style="font-size:0.6rem;color:#555;margin-top:2px">${esc(b.desc)}</div>
        </div>`;

    function buildRanking() {
      const s = statsCache;
      const rankClasses = ['gold', 'silver', 'bronze', 'normal', 'normal', 'normal', 'normal', 'normal', 'normal', 'normal'];

      const leaderboard = Object.entries(s.observerStats)
        .map(([name, data]) => ({ name, count: data.count, species: data.species.size, rivers: data.rivers.size }))

        .slice(0, 10);

        <div class="mission-banner">

          <div class="lb-header">순위 · 관찰자 · 종 수 · 관찰 횟수</div>

    // --- 수질 모니터링 ---
    let wqPhotoData = null;
    document.getElementById('wqPhotoInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        wqPhotoData = ev.target.result;
        const prev = document.getElementById('wqPhotoPreview');
        prev.src = wqPhotoData; prev.style.display = 'block';
        document.getElementById('wqPhotoPlaceholder').style.display = 'none';
        document.getElementById('wqPhotoArea').style.borderColor = '#7873f5';
      };
      reader.readAsDataURL(file);
    });

    function gradeDo(val) {
      if (val >= 7.5) return { grade: '매우좋음', color: '#2ecc71', emoji: '🟢' };
      if (val >= 5.0) return { grade: '좋음', color: '#27ae60', emoji: '🟢' };
      if (val >= 2.0) return { grade: '보통', color: '#f39c12', emoji: '🟡' };
      return { grade: '나쁨', color: '#e74c3c', emoji: '🔴' };
    }

    function wqEvaluate() {
      const ph = parseFloat(document.getElementById('wqPh').value);
      const doVal = parseFloat(document.getElementById('wqDo').value);
      const temp = parseFloat(document.getElementById('wqTemp').value);
      const turb = parseFloat(document.getElementById('wqTurb').value);
      const ec = parseFloat(document.getElementById('wqEC').value);
      const bod = parseFloat(document.getElementById('wqBod').value);
      const cod = parseFloat(document.getElementById('wqCod').value);
      const ss = parseFloat(document.getElementById('wqSS').value);
      const color = document.getElementById('wqColor').value;
      const smell = document.getElementById('wqSmell').value;
      const flow = document.getElementById('wqFlow').value;
      const trash = document.getElementById('wqTrash').value;
      const weather = document.getElementById('wqWeather').value;
      const airTemp = parseFloat(document.getElementById('wqAirTemp').value);
      const humidity = parseFloat(document.getElementById('wqHumidity').value);
      const rain = document.getElementById('wqRain').value;

      if (isNaN(ph) && isNaN(doVal)) {
        alert('pH 또는 DO 중 하나 이상 입력해주세요.');
        return;
      }

      let html = '<div style="font-weight:700;margin-bottom:0.5rem">📋 수질 평가 결과</div>';
      const items = [];
      if (!isNaN(ph)) {
        const ok = ph >= 6.5 && ph <= 8.5;
        items.push(`<span style="color:${ok ? '#2ecc71' : '#e74c3c'}">pH ${ph} — ${ok ? '정상 범위' : '⚠ 기준 초과'}</span>`);
      }
      if (!isNaN(doVal)) {
        const g = gradeDo(doVal);
        items.push(`<span style="color:${g.color}">DO ${doVal} mg/L — ${g.emoji} ${g.grade}</span>`);
      }
      if (!isNaN(temp)) items.push(`<span style="color:#5dade2">수온 ${temp}°C</span>`);
      if (!isNaN(turb)) items.push(`<span style="color:${turb > 30 ? '#e74c3c' : '#2ecc71'}">탁도 ${turb} NTU</span>`);
      if (!isNaN(ec)) items.push(`<span style="color:#aaa">전기전도도 ${ec} µS/cm</span>`);
      if (!isNaN(bod)) items.push(`<span style="color:${bod > 5 ? '#e74c3c' : '#2ecc71'}">BOD ${bod} mg/L</span>`);
      if (!isNaN(cod)) items.push(`<span style="color:${cod > 10 ? '#e74c3c' : '#2ecc71'}">COD ${cod} mg/L</span>`);
      if (!isNaN(ss)) items.push(`<span style="color:${ss > 25 ? '#e74c3c' : '#2ecc71'}">SS ${ss} mg/L</span>`);
      if (color) items.push(`<span style="color:#aaa">수색: ${color}</span>`);
      if (smell) items.push(`<span style="color:#aaa">냄새: ${smell}</span>`);
      if (flow) items.push(`<span style="color:#aaa">유속: ${flow}</span>`);
      if (trash) items.push(`<span style="color:${trash === '심각' ? '#e74c3c' : '#aaa'}">쓰레기: ${trash}</span>`);
      if (weather) items.push(`<span style="color:#aaa">날씨: ${weather}</span>`);
      if (!isNaN(airTemp)) items.push(`<span style="color:#aaa">기온 ${airTemp}°C</span>`);
      if (!isNaN(humidity)) items.push(`<span style="color:#aaa">습도 ${humidity}%</span>`);
      if (rain) items.push(`<span style="color:#aaa">강수: ${rain}</span>`);

      html += items.join('<br>');
      const el = document.getElementById('wqResult');
      el.innerHTML = html;
      el.style.display = 'block';
      document.getElementById('wqSubmitBtn').style.display = 'block';
    }

    async function wqSubmit() {
      const river = document.getElementById('wqRiver').value;
      if (!river) { alert('하천을 선택해주세요.'); return; }

      const observer = document.getElementById('wqObserver').value || '시민과학자';
      const f = id => { const v = parseFloat(document.getElementById(id).value); return isNaN(v) ? null : v; };
      const s = id => document.getElementById(id).value || null;
      const doVal = f('wqDo');

      const record = {
        river, observer,
        ph: f('wqPh'), dissolved_oxygen: doVal,
        water_temp: f('wqTemp'), turbidity: f('wqTurb'),
        conductivity: f('wqEC'), bod: f('wqBod'), cod: f('wqCod'), ss: f('wqSS'),
        water_color: s('wqColor'), smell: s('wqSmell'),
        flow_speed: s('wqFlow'), trash_level: s('wqTrash'),
        weather: s('wqWeather'), air_temp: f('wqAirTemp'),
        humidity: f('wqHumidity'), recent_rain: s('wqRain'),
        do_grade: doVal !== null ? gradeDo(doVal).grade : null,
        memo: s('wqMemo'),
        photo_data: wqPhotoData ? wqPhotoData.substring(0, 200000) : null,
        measured_at: new Date().toISOString(),
      };

      const btn = document.getElementById('wqSubmitBtn');
      btn.disabled = true; btn.textContent = '저장 중...';

      try {
        const res = await fetch(`${SUPABASE_URL}/rest/v1/citizen_water_quality`, {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
          body: JSON.stringify(record),
        });
        if (!res.ok) throw new Error(res.status);

        if (observer !== '시민과학자') localStorage.setItem('rw_wq_observer', observer);
        btn.textContent = '✅ 저장 완료!'; btn.style.background = '#2ecc71'; btn.style.color = '#fff'; btn.style.borderColor = '#2ecc71';
        setTimeout(() => {
          btn.textContent = '저장하기'; btn.disabled = false; btn.style.display = 'none';
          btn.style.background = '#1a1a28'; btn.style.color = '#7873f5'; btn.style.borderColor = '#7873f5';
          ['wqPh','wqDo','wqTemp','wqTurb','wqEC','wqBod','wqCod','wqSS','wqMemo','wqAirTemp','wqHumidity'].forEach(id => document.getElementById(id).value = '');
          ['wqColor','wqSmell','wqFlow','wqTrash','wqWeather','wqRain'].forEach(id => document.getElementById(id).selectedIndex = 0);
          document.getElementById('wqResult').style.display = 'none';
          wqPhotoData = null;
          document.getElementById('wqPhotoPreview').style.display = 'none';
          document.getElementById('wqPhotoPlaceholder').style.display = '';
          document.getElementById('wqPhotoArea').style.borderColor = '#2a2a3a';
          loadWqHistory();
        }, 1200);
      } catch (e) {
        alert('저장 실패: ' + e.message);
        btn.textContent = '저장하기'; btn.disabled = false;
      }
    }

    async function loadWqHistory() {
      const rows = await query('citizen_water_quality',
        'select=river,observer,ph,dissolved_oxygen,water_temp,turbidity,conductivity,bod,cod,ss,do_grade,water_color,smell,flow_speed,trash_level,weather,air_temp,humidity,recent_rain,memo,measured_at&order=measured_at.desc&limit=15');
      const el = document.getElementById('wqHistory');
      if (!rows.length) {
        el.innerHTML = '<div style="text-align:center;color:#555;font-size:0.82rem;padding:1rem">아직 측정 기록이 없습니다</div>';
        return;
      }
      let html = '<div style="font-size:0.82rem;font-weight:600;color:#aaa;margin-bottom:0.5rem">📊 최근 측정 기록</div>';
      rows.forEach(r => {
        const t = r.measured_at ? new Date(r.measured_at).toLocaleString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' }) : '';
        const parts = [];
        if (r.ph != null) parts.push(`pH ${r.ph}`);
        if (r.dissolved_oxygen != null) parts.push(`DO ${r.dissolved_oxygen}`);
        if (r.water_temp != null) parts.push(`${r.water_temp}°C`);
        if (r.turbidity != null) parts.push(`탁도 ${r.turbidity}`);
        if (r.conductivity != null) parts.push(`EC ${r.conductivity}`);
        if (r.bod != null) parts.push(`BOD ${r.bod}`);
        if (r.cod != null) parts.push(`COD ${r.cod}`);
        if (r.ss != null) parts.push(`SS ${r.ss}`);
        const gc = r.do_grade === '매우좋음' || r.do_grade === '좋음' ? '#2ecc71' : r.do_grade === '보통' ? '#f39c12' : '#888';
        const obs = [];
        if (r.water_color) obs.push(`수색:${esc(r.water_color)}`);
        if (r.smell) obs.push(`냄새:${esc(r.smell)}`);
        if (r.flow_speed) obs.push(`유속:${esc(r.flow_speed)}`);
        if (r.trash_level) obs.push(`쓰레기:${esc(r.trash_level)}`);
        if (r.weather) obs.push(`날씨:${esc(r.weather)}`);
        html += `<div style="background:#12121a;border:1px solid #2a2a3a;border-radius:10px;padding:0.6rem 0.8rem;margin-bottom:0.4rem">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.25rem">
            <span style="font-weight:700;font-size:0.85rem">${esc(r.river||'')}</span>
            <span style="font-size:0.68rem;color:#555">${t}</span>
          </div>
          <div style="font-size:0.78rem;color:#999">${parts.join(' · ')}${r.do_grade ? ` <span style="color:${gc};font-weight:600">${esc(r.do_grade)}</span>` : ''}</div>
          ${obs.length ? `<div style="font-size:0.72rem;color:#666;margin-top:0.15rem">${obs.join(' · ')}</div>` : ''}
          ${r.observer ? `<div style="font-size:0.65rem;color:#555;margin-top:0.15rem">by ${esc(r.observer)}</div>` : ''}
        </div>`;
      });
      el.innerHTML = html;
    }

    const savedWqObs = localStorage.getItem('rw_wq_observer');
    if (savedWqObs) document.getElementById('wqObserver').value = savedWqObs;
    loadWqHistory();

    loadAllData().catch(err => {
      document.getElementById('loading-missions').innerHTML =
        `<div style="color:#e74c3c">로딩 실패: ${err.message}</div>`;
    });
  </script>
  <script src="gate.js"></script>
</body>
</html>
